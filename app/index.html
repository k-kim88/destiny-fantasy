<!DOCTYPE html>
<html lang="ko" data-theme="navy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DESTINY FANTASY</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#050410">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Noto+Serif+KR:wght@400;500;600;700&family=Noto+Serif+JP:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&family=Spectral:wght@400;500;600&family=DotGothic16&display=swap" rel="stylesheet">
</head>
<body>
<div id="app">
  <div id="screens" class="screen-host">
    <div id="boot-fallback" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#aebbe0;font-family:system-ui,sans-serif;font-size:13px;text-align:center;padding:24px">불러오는 중…</div>
  </div>
  <div id="toast"></div>
  <div id="saveMark" aria-hidden="true"><span class="sm-ico">💾</span><span class="sm-tx"></span></div>
</div>
<script>
// 부팅 진단: 모듈 스크립트가 실패하거나 예외가 나면 빈 화면 대신 메시지 표시
(function () {
  function show(msg) {
    var el = document.getElementById("boot-fallback");
    if (el) { el.style.color = "#ff9a8a"; el.style.whiteSpace = "pre-wrap";
      el.textContent = "실행 오류\n\n" + msg + "\n\n새로고침(캐시 지우기)을 해보고, 그래도 안 되면 이 메시지를 알려주세요."; }
  }
  window.addEventListener("error", function (e) {
    if (!window.__DF_BOOTED) show((e.message || "script error") + (e.filename ? "\n" + e.filename + ":" + e.lineno : ""));
  });
  window.addEventListener("unhandledrejection", function (e) {
    if (!window.__DF_BOOTED) show("Promise: " + ((e.reason && (e.reason.message || e.reason)) || "unknown"));
  });
  setTimeout(function () {
    if (!window.__DF_BOOTED) show("스크립트가 로드/실행되지 않았습니다. (모듈 로딩 실패 가능)");
  }, 8000);
})();
</script>
<script type="module" src="/src/main.js"></script>
</body>
</html>
