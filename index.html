<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0e1f">
<title>데스티니 크루세이더</title>
<style>
  /* ===== 리셋 / 테마 ===== */
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{
    --bg-0:#070a16; --bg-1:#0e1430; --bg-2:#172352;
    --gold:#e6c074; --gold-dim:#b8924a; --gold-line:rgba(230,192,116,.5);
    --ink:#eef2ff; --muted:#9fb0d8; --faint:#5f6f9c;
    --panel:rgba(12,20,46,.72); --line:#27325a;
    --serif:"Iowan Old Style","Apple SD Gothic Neo",Georgia,"Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  }
  html,body{height:100%;}
  body{
    font-family:var(--sans); color:var(--ink);
    background:var(--bg-0);
    display:flex; align-items:center; justify-content:center;
    min-height:100dvh; overflow:hidden; -webkit-font-smoothing:antialiased;
  }
  /* 모바일 프레임 */
  #app{
    position:relative; width:100%; max-width:460px; height:100dvh; overflow:hidden;
    background:
      radial-gradient(120% 70% at 50% -5%, var(--bg-2) 0%, var(--bg-1) 45%, var(--bg-0) 80%);
  }
  #app::after{ /* 비네트 */
    content:""; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(110% 80% at 50% 40%, transparent 55%, rgba(0,0,0,.55) 100%);
  }

  .screen{position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; padding:30px; text-align:center;
    animation:fade .35s ease;}
  .screen.hidden{display:none;}
  @keyframes fade{from{opacity:0}to{opacity:1}}

  /* ===== 타이틀 로고 ===== */
  .logo{user-select:none; margin-bottom:6px;}
  .logo .word{display:block; font-family:var(--serif); font-weight:800; line-height:.96;
    letter-spacing:.06em; font-size:46px;
    background:linear-gradient(180deg,#fff7da 0%,#f0d28c 38%,#d7a948 54%,#9c6f2e 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    -webkit-text-fill-color:transparent;
    text-shadow:0 1px 0 rgba(0,0,0,.3);}
  .logo .word.small{font-size:40px;}
  .rule{display:flex; align-items:center; justify-content:center; gap:10px; margin:14px 0 2px;}
  .rule .ln{height:1px; width:54px; background:linear-gradient(90deg,transparent,var(--gold-line));}
  .rule .ln.r{background:linear-gradient(90deg,var(--gold-line),transparent);}
  .rule .gem{width:9px; height:9px; transform:rotate(45deg);
    background:linear-gradient(135deg,#fff3c8,var(--gold-dim)); box-shadow:0 0 8px rgba(230,192,116,.5);}
  .sub-ko{font-family:var(--serif); font-size:19px; letter-spacing:.34em; color:var(--gold);
    padding-left:.34em;}
  .tagline{color:var(--muted); font-size:12.5px; letter-spacing:.06em; margin-top:6px;}

  /* ===== 메뉴 ===== */
  .menu{margin-top:30px; width:100%; max-width:280px; display:flex; flex-direction:column; gap:10px;}
  .menu .item{
    appearance:none; width:100%; font-family:var(--serif); font-size:17px; font-weight:600;
    color:var(--ink); background:var(--panel); border:1px solid var(--gold-line);
    padding:13px 18px; border-radius:10px; cursor:pointer; letter-spacing:.04em;
    -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
    transition:transform .08s ease, color .15s, border-color .15s, background .15s;
  }
  .menu .item:active{transform:scale(.98);}
  .menu .item.primary{color:#1c1206;
    background:linear-gradient(180deg,#f0d28c,#d7a948); border-color:#f0d28c;}
  .menu .item.disabled{color:var(--faint); border-color:var(--line); cursor:default; background:transparent;}

  .foot{position:absolute; bottom:16px; left:0; right:0; text-align:center;
    color:var(--faint); font-size:10.5px; letter-spacing:.16em;}

  /* placeholder 화면 */
  .ph-title{font-family:var(--serif); font-size:24px; color:var(--gold); letter-spacing:.08em;}
  .ph-text{color:var(--muted); font-size:14px; line-height:1.8; max-width:300px;}
  .back{appearance:none; margin-top:8px; background:transparent; border:1px solid var(--gold-line);
    color:var(--gold); font-size:14px; padding:10px 22px; border-radius:9px; cursor:pointer;}

  /* 토스트 */
  #toast{position:absolute; bottom:64px; left:50%; transform:translateX(-50%);
    background:rgba(12,20,46,.96); border:1px solid var(--gold-line); color:var(--ink);
    padding:10px 18px; border-radius:10px; font-size:13px; opacity:0;
    transition:opacity .25s ease; pointer-events:none; max-width:86%; z-index:30;}

  /* ===== 필드(탐험) 화면 ===== */
  #scField{padding:0; gap:0; justify-content:flex-start;}
  #fieldCanvas{position:absolute; inset:0; width:100%; height:100%; display:block;
    image-rendering:auto; touch-action:none;}
  /* 상단 위치 패널 */
  .hud{position:absolute; top:14px; left:14px; z-index:10;
    background:var(--panel); border:1px solid var(--gold-line); border-radius:9px;
    padding:7px 13px; -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);}
  .hud .kick{font-size:9px; letter-spacing:.2em; color:var(--gold-dim);}
  .hud .loc{font-family:var(--serif); font-size:14px; color:var(--gold); letter-spacing:.04em;}
  .hud-back{position:absolute; top:14px; right:14px; z-index:10;
    background:var(--panel); border:1px solid var(--gold-line); color:var(--gold);
    font-size:13px; padding:7px 12px; border-radius:9px; cursor:pointer;}
  .hud-save{position:absolute; top:52px; right:14px; z-index:10;
    background:var(--panel); border:1px solid var(--gold-line); color:var(--gold);
    font-size:12px; padding:6px 11px; border-radius:9px; cursor:pointer;}
  .hud-party{position:absolute; top:90px; right:14px; z-index:10;
    background:var(--panel); border:1px solid var(--gold-line); color:var(--gold);
    font-size:12px; padding:6px 11px; border-radius:9px; cursor:pointer;}

  /* 시트(슬롯/파티 공통) */
  #scSlots, #scParty{justify-content:flex-start; padding:0;}
  .sheet{width:100%; height:100%; display:flex; flex-direction:column; padding:22px 16px 16px; gap:10px;}
  .sheet-title{font-family:var(--serif); font-size:22px; color:var(--gold); text-align:center; letter-spacing:.06em;}
  .sheet-sub{text-align:center; color:var(--muted); font-size:13px;}
  .sheet-hint{text-align:center; color:var(--faint); font-size:11px; line-height:1.5;}
  .sheet-list{flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:9px; padding:4px 2px;}
  .sheet-close{align-self:center; font-family:var(--serif); font-size:15px; color:var(--ink);
    background:var(--panel); border:1px solid var(--gold-line); border-radius:10px; padding:11px 30px; cursor:pointer;}
  /* 슬롯 행 */
  .slotrow{display:flex; flex-direction:column; align-items:flex-start; gap:3px; text-align:left;
    background:var(--panel); border:1px solid var(--gold-line); border-radius:10px; padding:13px 16px; cursor:pointer; color:var(--ink);}
  .slotrow.empty{opacity:.6;}
  .slotrow:disabled{opacity:.4; cursor:default;}
  .slotrow .sl-name{font-family:var(--serif); font-size:16px; color:var(--gold);}
  .slotrow .sl-meta{font-size:12px; color:var(--muted);}
  /* 파티 행 */
  .prow{display:flex; align-items:center; gap:10px; background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:9px 11px;}
  .prow.r-front{border-color:rgba(230,192,116,.55);}
  .prow.r-back{border-color:rgba(122,162,255,.5);}
  .prow .p-emo{font-size:26px;}
  .prow .p-info{flex:1; font-family:var(--serif); color:var(--ink); font-size:14px; line-height:1.3;}
  .prow .p-info .p-lv{color:var(--gold); font-size:12px;}
  .prow .p-info .p-sub{display:block; color:var(--muted); font-size:10.5px; font-family:var(--sans);}
  .prow .p-btns{display:flex; gap:4px;}
  .prow .p-btns button{font-size:11px; color:var(--muted); background:transparent; border:1px solid var(--line);
    border-radius:7px; padding:7px 8px; cursor:pointer;}
  .prow .p-btns button.on{color:#1c1206; background:linear-gradient(180deg,#f0d28c,#d7a948); border-color:#f5dca0;}

  /* 필드 추가 HUD */
  .hud-bag{position:absolute; top:128px; right:14px; z-index:10;
    background:var(--panel); border:1px solid var(--gold-line); color:var(--gold);
    font-size:12px; padding:6px 11px; border-radius:9px; cursor:pointer;}
  .hud-gold{position:absolute; top:70px; left:14px; z-index:10;
    background:var(--panel); border:1px solid var(--gold-line); color:var(--gold);
    font-size:12px; padding:5px 10px; border-radius:9px;}

  /* 장비창 (디아블로식) */
  .eq-head{display:flex; align-items:center; justify-content:space-between; gap:8px;}
  .eq-head .eq-who{font-family:var(--serif); font-size:18px; color:var(--gold);}
  .eq-arrow{font-size:20px; color:var(--gold); background:var(--panel); border:1px solid var(--gold-line); border-radius:8px; padding:4px 14px; cursor:pointer;}
  .eq-top{display:flex; gap:10px;}
  .paperdoll{flex:1; display:grid; gap:6px; grid-template-columns:repeat(3,1fr);
    grid-template-areas:". head ." "weapon body shield" "gloves boots accessory";}
  .pslot{display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
    min-height:54px; background:rgba(8,12,28,.5); border:1px solid var(--line); border-radius:9px; cursor:pointer; padding:4px;}
  .pslot.filled{border-color:var(--gold-line); background:rgba(40,55,110,.35);}
  .pslot .pi{font-size:22px;} .pslot .pi.dim{opacity:.4;}
  .pslot .pl{font-size:9px; color:var(--muted);} .pslot .pl.dim{color:var(--faint);}
  .eq-stats{width:120px; background:rgba(8,12,28,.45); border:1px solid var(--line); border-radius:9px; padding:8px 10px;}
  .eq-stats .strow{display:flex; justify-content:space-between; font-size:12px; color:var(--ink); padding:2px 0;}
  .eq-stats .strow em{color:var(--gold); font-style:normal; font-size:11px;}
  .eq-gold{text-align:center; color:var(--gold); font-size:13px;}
  .eq-invtitle{text-align:center; color:var(--faint); font-size:11px;}
  .inv-empty{text-align:center; color:var(--faint); font-size:13px; padding:20px;}
  .invrow{display:flex; align-items:center; gap:10px; text-align:left;
    background:var(--panel); border:1px solid var(--line); border-radius:9px; padding:8px 11px; cursor:pointer; color:var(--ink);}
  .invrow .iv-ic{font-size:22px;}
  .invrow .iv-info{flex:1; font-size:13px; line-height:1.3;}
  .invrow .iv-info .iv-sub{display:block; color:var(--muted); font-size:11px;}
  .invrow .iv-act{font-size:12px; color:#1c1206; background:linear-gradient(180deg,#f0d28c,#d7a948); border-radius:7px; padding:6px 10px;}

  /* 통합 메뉴 */
  .hud-menu{position:absolute; top:52px; right:14px; z-index:10;
    background:var(--panel); border:1px solid var(--gold-line); color:var(--gold); font-size:13px; padding:7px 13px; border-radius:9px; cursor:pointer;}
  #scMenu{justify-content:flex-start; padding:0;}
  .menu-wrap{flex:1; width:100%; display:flex; gap:10px; padding:22px 16px 8px;}
  .menu-cmds{width:42%; display:flex; flex-direction:column; gap:9px;}
  .menu-cmds .mcmd{font-family:var(--serif); font-size:17px; color:var(--ink); text-align:left;
    background:var(--panel); border:1px solid var(--gold-line); border-radius:10px; padding:13px 16px; cursor:pointer;}
  .menu-cmds .mcmd:active{transform:scale(.98);}
  .menu-party{flex:1; display:flex; flex-direction:column; gap:7px; overflow-y:auto;}
  .mp-row{display:flex; align-items:center; gap:9px; text-align:left; background:var(--panel); border:1px solid var(--line); border-radius:9px; padding:7px 9px; cursor:pointer;}
  .mp-row.r-front{border-left:3px solid var(--gold);}
  .mp-row.r-back{border-left:3px solid #6aa8ff;}
  .mp-row.r-reserve{opacity:.7; border-left:3px solid var(--faint);}
  .eq-portrait.mini{width:38px; height:38px; flex:none; border-radius:8px;}
  .eq-portrait.mini .pf-emo{font-size:24px;}
  .mp-row .mp-info{flex:1; font-family:var(--serif); color:var(--ink); font-size:13px; min-width:0;}
  .mp-row .mp-job{color:var(--gold-dim); font-size:11px;}
  .mp-row .mp-badge{float:right; font-size:10px; color:var(--muted); border:1px solid var(--line); border-radius:5px; padding:1px 5px;}
  .mp-row .mp-line{display:block; color:var(--muted); font-size:10.5px; font-family:var(--sans); margin-top:2px;}
  .mp-row .mp-bars{display:block; height:5px; margin-top:4px; background:rgba(0,0,0,.5); border-radius:3px; overflow:hidden;}
  .mp-row .mp-bars i{display:block; height:100%;}
  .mp-row .mp-bars i.hp{background:linear-gradient(180deg,#5fce7a,#2f8a48);}
  .menu-foot{padding:12px; text-align:center; color:var(--gold); font-size:13px;}

  /* 초상화 */
  .eq-portrait{position:relative; width:80px; height:80px; border:1px solid var(--gold-line); border-radius:10px;
    background:radial-gradient(circle at 50% 30%, rgba(40,55,110,.5), rgba(8,12,28,.7)); display:flex; align-items:center; justify-content:center; overflow:hidden;}
  .eq-portrait.sm{width:56px; height:56px;}
  .eq-portrait .pf-emo{font-size:40px;}
  .eq-portrait.sm .pf-emo{font-size:30px;}
  .eq-portrait .pf-img{position:absolute; inset:0; width:100%; height:100%; object-fit:contain;}
  .eq-portrait.hasimg .pf-emo{display:none;}
  .eq-job{display:block; font-size:11px; color:var(--gold-dim); font-family:var(--sans);}

  /* 스테이터스 */
  .st-top{display:flex; gap:12px; align-items:center;}
  .st-info{flex:1; color:var(--ink); font-size:13px; line-height:1.5;}
  .st-info .st-lv{font-family:var(--serif); color:var(--gold); font-size:16px;}
  .st-info .st-bar{height:6px; background:rgba(0,0,0,.5); border:1px solid var(--line); border-radius:4px; overflow:hidden; margin:3px 0;}
  .st-info .st-bar > i{display:block; height:100%; background:linear-gradient(180deg,#e6c074,#b8924a);}
  .st-stats{display:grid; grid-template-columns:1fr 1fr; gap:4px 16px; background:rgba(8,12,28,.45); border:1px solid var(--line); border-radius:9px; padding:9px 14px;}
  .st-stats .strow{display:flex; justify-content:space-between; font-size:13px; color:var(--ink);}
  .st-stats .strow em{color:var(--gold); font-style:normal; font-size:11px;}
  .st-equip{display:flex; flex-direction:column; gap:4px;}
  .st-eqrow{display:flex; justify-content:space-between; font-size:13px; color:var(--ink); background:var(--panel); border:1px solid var(--line); border-radius:7px; padding:7px 12px;}
  .st-eqrow .se-lab{color:var(--muted);}

  /* 장비 탭 / 액션 */
  .eq-actions{display:flex; align-items:center; justify-content:space-between; gap:8px;}
  .eq-actions .eq-gold{color:var(--gold); font-size:13px;}
  .eq-auto{font-family:var(--serif); font-size:13px; color:#1c1206; background:linear-gradient(180deg,#f0d28c,#d7a948);
    border:1px solid #f5dca0; border-radius:9px; padding:8px 14px; cursor:pointer;}
  .eq-tabs{display:flex; gap:6px;}
  .eq-tabs .eqtab{flex:1; font-size:13px; color:var(--muted); background:rgba(12,20,46,.6); border:1px solid var(--line); border-radius:8px 8px 0 0; padding:9px 0; cursor:pointer;}
  .eq-tabs .eqtab.on{color:var(--gold); background:var(--panel); border-color:var(--gold-line); border-bottom-color:transparent;}

  /* 가상 조이스틱 (떠다니는 방식 · 반투명) — 누른 자리에 생성 */
  #joyBase{position:absolute; z-index:10; width:148px; height:148px; border-radius:50%;
    transform:translate(-50%,-50%); pointer-events:none; touch-action:none;
    opacity:0; transition:opacity .12s ease;
    background:radial-gradient(circle, rgba(150,170,230,.13), rgba(40,55,110,.20));
    border:1px solid rgba(230,192,116,.4);
    -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px);}
  #joyBase.on{opacity:.78;}
  #joyBase::before{content:""; position:absolute; inset:40px; border-radius:50%;
    border:1px dashed rgba(230,192,116,.28);}
  #joyKnob{position:absolute; left:50%; top:50%; width:66px; height:66px; border-radius:50%;
    transform:translate(-50%,-50%); pointer-events:none;
    background:radial-gradient(circle at 50% 38%, rgba(255,243,200,.72), rgba(201,154,63,.5));
    border:1px solid rgba(245,220,160,.7);
    box-shadow:0 3px 10px rgba(0,0,0,.32), inset 0 1px 3px rgba(255,255,255,.4);}

  /* A버튼(확인) */
  #aBtn{position:absolute; right:26px; bottom:42px; z-index:10;
    width:62px; height:62px; border-radius:50%; font-family:var(--serif); font-weight:700;
    color:#1c1206; background:linear-gradient(180deg,#f0d28c,#d7a948); border:1px solid #f5dca0;
    font-size:20px; cursor:pointer;}
  #aBtn:active{transform:scale(.96);}
  #aBtn.hint{box-shadow:0 0 0 3px rgba(230,192,116,.55), 0 0 18px rgba(230,192,116,.6);}

  /* 대화창 */
  #dialog{position:absolute; left:0; right:0; bottom:0; z-index:20; padding:14px;}
  #dialog.hidden{display:none;}
  .dlg-box{position:relative; background:rgba(9,14,32,.97); border:1px solid var(--gold-line);
    border-radius:12px; padding:13px 16px 16px; min-height:92px;
    box-shadow:0 -6px 24px rgba(0,0,0,.4);}
  .dlg-name{font-family:var(--serif); color:var(--gold); font-size:14px; letter-spacing:.06em; margin-bottom:8px;}
  .dlg-text{color:var(--ink); font-size:15px; line-height:1.62;}
  .dlg-next{position:absolute; right:14px; bottom:9px; color:var(--gold); font-size:13px; animation:blink 1.1s infinite;}
  @keyframes blink{50%{opacity:.15}}

  /* ===== 전투 (FF6 사이드뷰) ===== */
  #scBattle{padding:0; gap:0; justify-content:flex-start;
    background:linear-gradient(180deg,#1c1438 0%, #0e0a1e 58%, #08060f 100%);}
  #scBattle.shake{animation:scShake .3s;}
  @keyframes scShake{0%,100%{transform:translate(0,0)}25%{transform:translate(-4px,2px)}75%{transform:translate(4px,-2px)}}
  .bt-stage{flex:1; width:100%; position:relative; display:flex; align-items:center; justify-content:space-between; padding:20px 12px 6px;}
  .bt-side{display:flex; flex-direction:column; gap:13px;}
  .bt-side.enemies{align-items:flex-start; width:40%;}
  .bt-side.heroes{flex-direction:row; align-items:center; justify-content:flex-end; gap:6px; width:56%;}
  .hcol{display:flex; flex-direction:column; gap:13px; justify-content:center;}
  .battler{position:relative; display:flex; flex-direction:column; align-items:center; width:78px; transition:transform .14s ease;}
  .battler .spr{font-size:44px; line-height:1; filter:drop-shadow(0 4px 6px rgba(0,0,0,.55));}
  .heroes .battler .spr{transform:scaleX(-1);}            /* 주인공은 적(왼쪽)을 바라봄 */
  .battler .spr .hspr{width:66px; height:66px; object-fit:contain; display:block; image-rendering:auto;}
  .battler .spr .emo{display:block;}
  .battler .spr.hasimg .emo{display:none;}                /* 스프라이트가 있으면 이모지 숨김 */
  .battler .bname{font-size:11px; color:var(--ink); margin-top:4px; font-family:var(--serif);}
  .battler .bhp,.battler .bmp{width:76px; height:6px; margin-top:3px; background:rgba(0,0,0,.5); border:1px solid var(--line); border-radius:3px; overflow:hidden;}
  .battler .bhp>i{display:block; height:100%; background:linear-gradient(180deg,#5fce7a,#2f8a48); transition:width .3s;}
  .battler .bmp>i{display:block; height:100%; background:linear-gradient(180deg,#6aa8ff,#2f5fb0); transition:width .3s;}
  .battler.active .bname{color:var(--gold);}
  .battler.active::after{content:"▶"; position:absolute; left:-14px; top:16px; color:var(--gold); font-size:12px; animation:blink 1s infinite;}
  .heroes .battler.active::after{content:"◀"; left:auto; right:-14px;}
  .heroes .battler.lunge{transform:translateX(-26px) scale(1.06);}
  .enemies .battler.lunge{transform:translateX(26px) scale(1.06);}
  .battler.hurt{animation:hurtShake .32s;}
  @keyframes hurtShake{0%,100%{} 30%{transform:translateX(6px)} 60%{transform:translateX(-5px)}}
  .battler.hurt .spr{animation:hurtFlash .32s;}
  @keyframes hurtFlash{0%{filter:brightness(3) saturate(2) drop-shadow(0 0 6px #f55)} 100%{}}
  .battler.dead .spr{animation:die .6s forwards;}
  @keyframes die{to{opacity:0; transform:rotate(62deg) translateY(16px); filter:grayscale(1) brightness(.5);}}
  .battler.cast{animation:castHop .6s;}
  @keyframes castHop{40%{transform:translateY(-9px)}}
  .battler.cast .spr{animation:castGlow .6s;}
  @keyframes castGlow{40%{filter:drop-shadow(0 0 11px var(--gold)) brightness(1.35)}}
  .battler.targetable .spr{cursor:pointer; animation:tgtPulse .7s infinite;}
  @keyframes tgtPulse{50%{filter:drop-shadow(0 0 9px #fff) brightness(1.35)}}
  .dmgnum{position:absolute; top:-4px; left:50%; font-family:var(--serif); font-weight:800; font-size:21px;
    color:#ff6a5a; text-shadow:0 2px 3px #000; pointer-events:none; animation:floatUp .85s forwards;}
  .dmgnum.crit{font-size:28px; color:#ffd24a;}
  .dmgnum.heal{color:#6fe28a;}
  .dmgnum.miss{font-size:15px; color:#cfd6e6;}
  @keyframes floatUp{0%{opacity:0; transform:translate(-50%,8px)} 20%{opacity:1} 100%{opacity:0; transform:translate(-50%,-34px)}}
  .spark{position:absolute; top:8px; left:50%; transform:translate(-50%,-50%); font-size:30px; pointer-events:none; animation:spk .42s forwards;}
  @keyframes spk{0%{opacity:0; transform:translate(-50%,-50%) scale(.4)} 40%{opacity:1} 100%{opacity:0; transform:translate(-50%,-50%) scale(1.6)}}
  .stun{position:absolute; top:-16px; left:50%; font-size:18px; animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:translate(-50%,0) rotate(360deg)} from{transform:translate(-50%,0) rotate(0)}}
  .battler.boss .spr{font-size:76px;}
  .battler.boss .bhp{visibility:hidden;}
  .battler.boss.revealed .bhp{visibility:visible;}
  .bosslabel{font-size:11px; color:#ff8a7a; margin-top:2px; font-family:var(--serif); letter-spacing:.05em;}
  .bt-log{width:100%; padding:11px 16px; min-height:46px; color:var(--ink); font-size:14px; line-height:1.45;
    background:rgba(9,14,32,.93); border-top:1px solid var(--gold-line);}
  .bt-menu{width:100%; padding:10px 14px 18px; display:grid; grid-template-columns:repeat(3,1fr); gap:8px; min-height:62px;}
  .bt-menu button{font-family:var(--serif); font-size:15px; font-weight:600; color:#1c1206;
    background:linear-gradient(180deg,#f0d28c,#d7a948); border:1px solid #f5dca0; border-radius:9px; padding:12px 4px; cursor:pointer;}
  .bt-menu button.sub{background:rgba(12,20,46,.92); color:var(--gold); border-color:var(--gold-line);}
  .bt-menu button:active{transform:scale(.97);}
  .bt-menu button:disabled{opacity:.4; cursor:default;}
</style>
</head>
<body>
<div id="app">

  <!-- ===== 타이틀 화면 ===== -->
  <section class="screen" id="scTitle">
    <div class="logo">
      <span class="word">DESTINY</span>
      <span class="word small">CRUSADER</span>
    </div>
    <div class="rule"><span class="ln"></span><span class="gem"></span><span class="ln r"></span></div>
    <div class="sub-ko">데스티니 크루세이더</div>
    <div class="tagline">운명을 건 십자군의 모험</div>

    <div class="menu">
      <button class="item primary" data-a="new">새 게임</button>
      <button class="item disabled" data-a="cont">이어하기</button>
      <button class="item" data-a="settings">설정</button>
    </div>
    <div class="foot">© 2026 · DESTINY CRUSADER · Ver 0.1</div>
  </section>

  <!-- ===== 필드(탐험) 화면 ===== -->
  <section class="screen hidden" id="scField">
    <canvas id="fieldCanvas"></canvas>
    <div class="hud"><div class="kick">NORTHERN WOODS</div><div class="loc">북부 숲길</div></div>
    <button class="hud-back" data-a="back">타이틀 ›</button>
    <button class="hud-menu" id="btnMenu">☰ 메뉴</button>
    <div class="hud-gold">🪙 <span id="goldVal">0</span></div>
    <div id="joyBase"><div id="joyKnob"></div></div>
    <button id="aBtn">A</button>
    <div id="dialog" class="hidden">
      <div class="dlg-box">
        <div class="dlg-name" id="dlgName"></div>
        <div class="dlg-text" id="dlgText"></div>
        <div class="dlg-next">▼</div>
      </div>
    </div>
  </section>

  <!-- ===== 전투 화면 (FF6 사이드뷰) ===== -->
  <section class="screen hidden" id="scBattle">
    <div class="bt-stage" id="btStage">
      <div class="bt-side enemies" id="enemySide"></div>
      <div class="bt-side heroes" id="heroSide">
        <div class="hcol" id="heroFront"></div>
        <div class="hcol" id="heroBack"></div>
      </div>
    </div>
    <div class="bt-log" id="btLog"></div>
    <div class="bt-menu" id="btMenu"></div>
  </section>

  <!-- ===== 저장/불러오기 슬롯 ===== -->
  <section class="screen hidden" id="scSlots">
    <div class="sheet">
      <div class="sheet-title" id="slotTitle">저장</div>
      <div class="sheet-list" id="slotList"></div>
      <button class="sheet-close" id="slotClose">닫기</button>
    </div>
  </section>

  <!-- ===== 메뉴 (FF/테일즈식) ===== -->
  <section class="screen hidden" id="scMenu">
    <div class="menu-wrap">
      <div class="menu-cmds" id="menuCmds"></div>
      <div class="menu-party" id="menuParty"></div>
    </div>
    <div class="menu-foot">📍 <span id="menuLoc">북부 숲길</span> · 🪙 골드 <span id="menuGold">0</span></div>
  </section>

  <!-- ===== 스테이터스 ===== -->
  <section class="screen hidden" id="scStatus">
    <div class="sheet">
      <div class="eq-head">
        <button class="eq-arrow" id="stPrev">‹</button>
        <div class="eq-who"><span id="stName"></span></div>
        <button class="eq-arrow" id="stNext">›</button>
      </div>
      <div class="st-top">
        <div class="eq-portrait" id="stPortrait"></div>
        <div class="st-info" id="stInfo"></div>
      </div>
      <div class="st-stats" id="stStats"></div>
      <div class="eq-invtitle">장착 장비</div>
      <div class="st-equip" id="stEquip"></div>
      <button class="sheet-close" id="stClose">뒤로</button>
    </div>
  </section>

  <!-- ===== 장비 / 인벤토리 (디아블로식) ===== -->
  <section class="screen hidden" id="scEquip">
    <div class="sheet">
      <div class="eq-head">
        <button class="eq-arrow" id="eqPrev">‹</button>
        <div class="eq-portrait sm" id="eqPortrait"></div>
        <div class="eq-who"><span id="eqName"></span><span class="eq-job" id="eqJob"></span></div>
        <button class="eq-arrow" id="eqNext">›</button>
      </div>
      <div class="eq-top">
        <div class="paperdoll" id="paperdoll"></div>
        <div class="eq-stats" id="eqStats"></div>
      </div>
      <div class="eq-actions">
        <span class="eq-gold">🪙 <span id="eqGold">0</span></span>
        <button class="eq-auto" id="eqAuto">⚡ 최강 장착</button>
      </div>
      <div class="eq-tabs" id="eqTabs"></div>
      <div class="sheet-list" id="invList"></div>
      <button class="sheet-close" id="eqClose">뒤로</button>
    </div>
  </section>

  <!-- ===== 파티 편성 ===== -->
  <section class="screen hidden" id="scParty">
    <div class="sheet">
      <div class="sheet-title">파티 편성</div>
      <div class="sheet-sub" id="partyCounts"></div>
      <div class="sheet-hint">전열은 물리 피해를 더 받고 더 줍니다 · 후열은 물리 피해 감소(원거리·마법은 영향 없음)</div>
      <div class="sheet-list" id="partyList"></div>
      <button class="sheet-close" id="partyClose">닫기</button>
    </div>
  </section>

  <!-- ===== 상점 ===== -->
  <section class="screen hidden" id="scShop">
    <div class="sheet">
      <div class="sheet-title">행상인</div>
      <div class="eq-actions"><span class="eq-gold">🪙 골드 <span id="shopGold">0</span></span></div>
      <div class="eq-tabs" id="shopTabs"></div>
      <div class="sheet-list" id="shopList"></div>
      <button class="sheet-close" id="shopClose">닫기</button>
    </div>
  </section>

  <!-- ===== 임시(다음 단계) 화면 ===== -->
  <section class="screen hidden" id="scPlaceholder">
    <div class="logo"><span class="word small">DESTINY</span></div>
    <div class="ph-title" id="phTitle">준비 중</div>
    <div class="ph-text" id="phText">이 부분은 다음 단계에서 만듭니다.</div>
    <button class="back" data-a="back">‹ 타이틀로</button>
  </section>

  <div id="toast"></div>
</div>

<script>
  "use strict";
  const $  = (s) => document.querySelector(s);
  const $$ = (s) => document.querySelectorAll(s);

  function toast(msg){
    const el = $("#toast");
    el.textContent = msg; el.style.opacity = 1;
    clearTimeout(el._t); el._t = setTimeout(() => el.style.opacity = 0, 1600);
  }

  // 아주 단순한 화면 전환기 — 여기서부터 화면을 늘려갑니다.
  function show(id){
    $$(".screen").forEach(s => s.classList.toggle("hidden", s.id !== id));
  }

  function openPlaceholder(title, text){
    $("#phTitle").textContent = title;
    $("#phText").innerHTML = text;
    show("scPlaceholder");
  }

  // 타이틀 메뉴
  $$("#scTitle .item").forEach(btn => btn.addEventListener("click", () => {
    if (btn.classList.contains("disabled")) return;
    const a = btn.dataset.a;
    if (a === "new")       startField();
    else if (a === "cont"){ openSlots("load", "title"); }
    else if (a === "settings") openPlaceholder("설정", "사운드 · 언어 등 설정을 다음 단계에서 추가합니다.");
  }));
  function refreshTitle(){ const c = document.querySelector('#scTitle .item[data-a="cont"]'); if (c) c.classList.toggle("disabled", !hasAnySave()); }

  // 뒤로
  $$('[data-a="back"]').forEach(b => b.addEventListener("click", () => { stopField(); refreshTitle(); show("scTitle"); }));

  /* =========================================================================
     STEP 2 — 필드(탐험): 타일 맵 · 이동 · 충돌 · 카메라
     ========================================================================= */
  // 0 풀, 1 나무(막힘), 2 물(막힘), 3 길, 4 꽃
  const MAP = [
    "1111111111111111",
    "1000000000000001",
    "1000011000000001",
    "1000011000033001",
    "1004000000033001",
    "1000000000033001",
    "1000000220033001",
    "1000002220033001",
    "1000002200033001",
    "1000000000033001",
    "1003333333333001",
    "1003000000000001",
    "1003000110000041",
    "1003000110000001",
    "1003000000000001",
    "1003000000044001",
    "1003000000044001",
    "1000000000000001",
    "1000011000001101",
    "1000011000001101",
    "1000000000000001",
    "1111111111111111",
  ].map(r => r.split("").map(Number));
  const ROWS = MAP.length, COLS = MAP[0].length, TILE = 40;
  const WALK = new Set([0, 3, 4]);
  const clamp = (v, a, b) => v < a ? a : v > b ? b : v;

  const cv = $("#fieldCanvas");
  const cx = cv.getContext("2d");
  let VW = 0, VH = 0, dpr = 1;
  function sizeCanvas(){
    dpr = Math.min(2, window.devicePixelRatio || 1);
    VW = cv.clientWidth; VH = cv.clientHeight;
    cv.width = Math.round(VW * dpr); cv.height = Math.round(VH * dpr);
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  // 플레이어 (월드 좌표 px)
  const player = { x: 8 * TILE + TILE / 2, y: 4 * TILE + TILE / 2, face: 1 };
  const keys = { up:false, down:false, left:false, right:false };       // 키보드
  const joy  = { active:false, x:0, y:0, id:null, cxp:0, cyp:0 };        // 가상 조이스틱(-1..1)
  const cam = { x: 0, y: 0 };

  // ===== 상호작용 오브젝트 (NPC · 표지판 · 보물상자) =====
  const OBJS = [
    { c:8,  r:2,  type:"npc",  solid:true, name:"마을 사람",
      lines:["여행자시군요. 이 북부 숲길엔 요즘 마물이 자주 나와요.",
             "조심해서 가세요, 크루세이더."] },
    { c:12, r:11, type:"sign", solid:true, name:"표지판",
      lines:["▲ 북 — 옛 성터 / ▼ 남 — 마을<br>“길을 잃으면 별을 보라.”"] },
    { c:5,  r:15, type:"chest", solid:true, name:"보물상자",
      opened:false, gold:120, loot:["sword","potion","potion"] },
    { c:11, r:2,  type:"shop", solid:true, name:"행상인",
      lines:["무기와 물약, 필요한 게 있나? 천천히 둘러보게."] },
    { c:8,  r:18, type:"boss", solid:true, name:"고대 수호기사",
      lines:["…침입자여. 이 숲은 내가 지킨다.", "돌아갈 생각이라면 지금이다. ……아니라면, 각오해라!"] },
  ];
  const objWX = (o) => o.c * TILE + TILE / 2;        // 중심 x
  const objFY = (o) => o.r * TILE + TILE;            // 발치 y(바닥선)
  function solidHit(px, py){
    for (const o of OBJS){
      if (!o.solid) continue;
      if (Math.abs(px - objWX(o)) < TILE*0.42 && Math.abs(py - (objFY(o) - TILE*0.4)) < TILE*0.40) return true;
    }
    return false;
  }
  function canWalk(px, py){ return tileWalk(px, py) && !solidHit(px, py); }
  function nearestObj(){
    let best = null, bd = TILE * 1.25;
    for (const o of OBJS){
      const d = Math.hypot(objWX(o) - player.x, (objFY(o) - TILE*0.5) - player.y);
      if (d < bd){ bd = d; best = o; }
    }
    return best;
  }

  // ===== 대화창 =====
  const dlg = { open:false, lines:[], i:0, onDone:null };
  function openDialog(name, lines, onDone){
    dlg.open = true; dlg.lines = lines; dlg.i = 0; dlg.onDone = onDone || null;
    document.getElementById("dlgName").textContent = name;
    document.getElementById("dlgText").innerHTML = lines[0];
    document.getElementById("dialog").classList.remove("hidden");
    hideJoy();
  }
  function advanceDialog(){
    dlg.i++;
    if (dlg.i >= dlg.lines.length){
      document.getElementById("dialog").classList.add("hidden");
      dlg.open = false;
      const cb = dlg.onDone; dlg.onDone = null; if (cb) cb();
      return;
    }
    document.getElementById("dlgText").innerHTML = dlg.lines[dlg.i];
  }
  function interact(o){
    player.face = (objWX(o) > player.x) ? 1 : -1;
    if (o.type === "chest"){
      if (o.opened){ openDialog(o.name, ["텅 비어 있다."]); return; }
      o.opened = true;
      prog.gold += (o.gold || 0);
      const names = (o.loot || []).map(id => { items[id] = (items[id]||0) + 1; return DB[id] ? DB[id].name : id; });
      updateGold(); autosave();
      const lootText = names.length ? names.join(", ") + " 와(과) " : "";
      openDialog(o.name, ["보물상자를 열었다!", `${lootText}골드 ${o.gold} 을(를) 얻었다.`]);
    } else if (o.type === "shop"){
      openDialog(o.name, o.lines, () => { stopField(); openShop(); });
    } else if (o.type === "boss"){
      if (prog.bossDefeated){ openDialog(o.name, ["…더 이상 싸울 이유는 없다."]); return; }
      openDialog(o.name, o.lines, () => startBoss(o));
    } else {
      openDialog(o.name, o.lines);
    }
  }
  function pressA(){
    if (dlg.open){ advanceDialog(); return; }
    const o = nearestObj();
    if (o) interact(o);
    else toast("주변에 살펴볼 것이 없어요");
  }

  // 현재 입력 벡터 (조이스틱 우선, 없으면 키보드). 크기는 0..1
  function inputVector(){
    let x = joy.x, y = joy.y;
    if (!joy.active){
      x = (keys.right?1:0) - (keys.left?1:0);
      y = (keys.down?1:0)  - (keys.up?1:0);
      const m = Math.hypot(x, y); if (m > 1){ x /= m; y /= m; }
    }
    return { x, y, mag: Math.min(1, Math.hypot(x, y)) };
  }

  function tileWalk(px, py){
    const c = Math.floor(px / TILE), r = Math.floor(py / TILE);
    return r >= 0 && r < ROWS && c >= 0 && c < COLS && WALK.has(MAP[r][c]);
  }

  let raf = 0, last = 0, running = false, t = 0;
  function loop(ts){
    if (!running) return;
    const dt = Math.min(40, ts - last || 16); last = ts; t = ts;

    // 이동 (조이스틱/키보드 — 아날로그, 세기에 비례한 속도)
    const inp = inputVector();
    if (!dlg.open && inp.mag > 0.12){
      const vx = inp.x, vy = inp.y;
      if (Math.abs(vx) > 0.05) player.face = vx > 0 ? 1 : -1;
      const sp = TILE * 0.062 * (dt / 16);
      const nx = player.x + vx * sp;
      if (canWalk(nx + (vx>0?TILE*0.28:vx<0?-TILE*0.28:0), player.y + TILE*0.30)) player.x = nx;
      const ny = player.y + vy * sp;
      if (canWalk(player.x, ny + (vy>0?TILE*0.34:-TILE*0.10))) player.y = ny;

      // 랜덤 인카운터 (풀밭에서만)
      const tc = Math.floor(player.x/TILE), tr = Math.floor(player.y/TILE);
      if (tr>=0 && tr<ROWS && tc>=0 && tc<COLS && MAP[tr][tc]===0){
        _enc += sp * inp.mag;
        if (_enc >= _encNext){ _enc = 0; _encNext = TILE*(4+Math.random()*5);
          startBattle(); return; }
      }
    }

    // 가까운 상호작용 대상 → A버튼 강조
    const near = dlg.open ? null : nearestObj();
    document.getElementById("aBtn").classList.toggle("hint", !!near);

    // 카메라 (플레이어 중심, 맵 경계 클램프)
    const worldW = COLS*TILE, worldH = ROWS*TILE;
    cam.x = worldW <= VW ? (worldW-VW)/2 : clamp(player.x - VW/2, 0, worldW-VW);
    cam.y = worldH <= VH ? (worldH-VH)/2 : clamp(player.y - VH*0.46, 0, worldH-VH);

    draw();
    raf = requestAnimationFrame(loop);
  }

  function draw(){
    cx.clearRect(0, 0, VW, VH);
    cx.fillStyle = "#0d1a14"; cx.fillRect(0, 0, VW, VH);
    const c0 = Math.max(0, Math.floor(cam.x/TILE)), c1 = Math.min(COLS-1, Math.ceil((cam.x+VW)/TILE));
    const r0 = Math.max(0, Math.floor(cam.y/TILE)), r1 = Math.min(ROWS-1, Math.ceil((cam.y+VH)/TILE));
    // 바닥 타일
    for (let r=r0; r<=r1; r++) for (let c=c0; c<=c1; c++){
      const tile = MAP[r][c], x = c*TILE-cam.x, y = r*TILE-cam.y;
      if (tile === 2){ cx.fillStyle = "#1d4e8c"; cx.fillRect(x,y,TILE,TILE);
        cx.fillStyle = "rgba(190,225,240,.12)"; cx.fillRect(x+4, y+TILE*0.4+Math.sin(t*0.003+c)*2, TILE-8, 1); }
      else if (tile === 3){ cx.fillStyle = "#7a6243"; cx.fillRect(x,y,TILE,TILE); }
      else { cx.fillStyle = ((r+c)&1) ? "#2f5a32" : "#346134"; cx.fillRect(x,y,TILE,TILE); }
      if (tile === 4){ cx.fillStyle = "#e6c074"; cx.beginPath(); cx.arc(x+TILE*0.5, y+TILE*0.5, 3, 0, 7); cx.fill();
        cx.fillStyle = "#d97fae"; cx.beginPath(); cx.arc(x+TILE*0.32, y+TILE*0.62, 2.4, 0, 7); cx.fill(); }
    }
    // 깊이 정렬: 나무 + 상호작용 오브젝트 + 플레이어
    const items = [];
    for (let r=r0; r<=r1+1; r++) for (let c=c0; c<=c1; c++){
      if (r<0||r>=ROWS||MAP[r][c]!==1) continue;
      const wx = c*TILE+TILE/2, wy = r*TILE+TILE;
      items.push({ fy:wy, draw:()=>drawTree(wx-cam.x, wy-cam.y) });
    }
    for (const o of OBJS) items.push({ fy:objFY(o), draw:()=>drawObj(o) });
    items.push({ fy:player.y, draw:()=>drawPlayer(player.x-cam.x, player.y-cam.y) });
    items.sort((a,b)=>a.fy-b.fy);
    for (const it of items) it.draw();

    // 상호작용 마커 (가까운 대상 위 'A')
    const near = nearestObj();
    if (near && !dlg.open) drawMarker(objWX(near)-cam.x, objFY(near)-TILE-cam.y);
    // 가장자리 어둡게
    const g = cx.createLinearGradient(0,0,0,VH);
    g.addColorStop(0,"rgba(8,12,28,.45)"); g.addColorStop(.2,"rgba(0,0,0,0)");
    g.addColorStop(.82,"rgba(0,0,0,0)"); g.addColorStop(1,"rgba(5,8,20,.5)");
    cx.fillStyle = g; cx.fillRect(0,0,VW,VH);
  }

  function drawTree(sx, sy){
    cx.fillStyle = "rgba(0,0,0,.25)"; cx.beginPath(); cx.ellipse(sx, sy-3, TILE*0.32, TILE*0.12, 0, 0, 7); cx.fill();
    cx.fillStyle = "#4a3420"; cx.fillRect(sx-3, sy-TILE*0.7, 6, TILE*0.7);
    cx.fillStyle = "#244625"; cx.beginPath(); cx.arc(sx, sy-TILE*0.95, TILE*0.5, 0, 7); cx.fill();
    cx.fillStyle = "#356134"; cx.beginPath(); cx.arc(sx-5, sy-TILE*1.05, TILE*0.38, 0, 7); cx.fill();
    cx.fillStyle = "#4d8a4f"; cx.beginPath(); cx.arc(sx-TILE*0.18, sy-TILE*1.2, TILE*0.2, 0, 7); cx.fill();
  }

  function shadow(sx, sy, w){ cx.fillStyle = "rgba(0,0,0,.26)"; cx.beginPath(); cx.ellipse(sx, sy-2, w, w*0.4, 0, 0, 7); cx.fill(); }

  function drawObj(o){
    const sx = objWX(o) - cam.x, sy = objFY(o) - cam.y;
    if (o.type === "npc") drawNPC(sx, sy);
    else if (o.type === "sign") drawSign(sx, sy);
    else if (o.type === "chest") drawChest(sx, sy, o.opened);
    else if (o.type === "shop") drawEmoObj(sx, sy, "🛒", TILE*0.2);
    else if (o.type === "boss") drawEmoObj(sx, sy, (prog.bossDefeated ? "🪦" : "🐲"), TILE*0.28, !prog.bossDefeated);
  }
  function drawEmoObj(sx, sy, emo, sh, glow){
    shadow(sx, sy, sh);
    if (glow){ const p = 0.5+0.5*Math.sin(t*0.005); cx.fillStyle = `rgba(220,60,42,${0.15+0.25*p})`; cx.beginPath(); cx.arc(sx, sy-TILE*0.5, TILE*0.5, 0, 7); cx.fill(); }
    cx.font = `${Math.round(TILE*0.95)}px serif`; cx.textAlign = "center"; cx.textBaseline = "alphabetic";
    cx.fillText(emo, sx, sy);
    cx.textAlign = "left";
  }
  function drawNPC(sx, sy){
    shadow(sx, sy, TILE*0.22);
    cx.fillStyle = "#3d6b4a"; cx.beginPath();                       // 망토
    cx.moveTo(sx-8,sy-10); cx.lineTo(sx+8,sy-10); cx.lineTo(sx+6,sy-1); cx.lineTo(sx-6,sy-1); cx.closePath(); cx.fill();
    cx.fillStyle = "#5f9e6e"; cx.fillRect(sx-6, sy-22, 12, 14);     // 몸
    cx.fillStyle = "#caa24a"; cx.fillRect(sx-6, sy-12, 12, 2);      // 허리띠
    cx.fillStyle = "#f0c9a0"; cx.beginPath(); cx.arc(sx, sy-26, 4.6, 0, 7); cx.fill(); // 머리
    cx.fillStyle = "#8a5a32"; cx.fillRect(sx-5, sy-31, 10, 4);      // 머리카락/두건
  }
  function drawSign(sx, sy){
    shadow(sx, sy, TILE*0.2);
    cx.fillStyle = "#5b4128"; cx.fillRect(sx-2, sy-22, 4, 22);      // 기둥
    cx.fillStyle = "#7e5a32"; cx.fillRect(sx-13, sy-30, 26, 13);    // 판
    cx.fillStyle = "#3a2a18"; cx.fillRect(sx-13, sy-30, 26, 2);
    cx.fillStyle = "#caa24a"; cx.fillRect(sx-9, sy-26, 18, 1.6);    // 글씨 느낌
    cx.fillRect(sx-9, sy-23, 12, 1.6);
  }
  function drawChest(sx, sy, opened){
    shadow(sx, sy, TILE*0.2);
    cx.fillStyle = "#6e4a24"; cx.fillRect(sx-12, sy-15, 24, 15);    // 몸통
    cx.fillStyle = "#8a5e30"; cx.fillRect(sx-12, sy-15, 24, 4);
    cx.fillStyle = "#d7a948";                                       // 금속 띠
    cx.fillRect(sx-12, sy-9, 24, 2); cx.fillRect(sx-1.5, sy-15, 3, 15);
    if (!opened){
      cx.fillStyle = "#7e5630"; cx.beginPath();                     // 닫힌 뚜껑
      cx.moveTo(sx-12, sy-15); cx.lineTo(sx-12, sy-21); cx.quadraticCurveTo(sx, sy-26, sx+12, sy-21); cx.lineTo(sx+12, sy-15); cx.closePath(); cx.fill();
      cx.fillStyle = "#f0d28c"; cx.fillRect(sx-2, sy-13, 4, 4);     // 자물쇠
    } else {
      cx.fillStyle = "#2a1c10"; cx.fillRect(sx-10, sy-15, 20, 4);   // 열린 내부(어둠)
      cx.fillStyle = "#7e5630"; cx.beginPath();                     // 열린 뚜껑(뒤로)
      cx.moveTo(sx-12, sy-15); cx.lineTo(sx-12, sy-21); cx.quadraticCurveTo(sx, sy-31, sx+12, sy-26); cx.lineTo(sx+12, sy-19); cx.closePath(); cx.fill();
    }
  }
  function drawMarker(sx, sy){
    const p = 0.5 + 0.5*Math.sin(t*0.006), off = -p*3;
    cx.fillStyle = `rgba(230,192,116,${0.85})`;
    cx.beginPath(); cx.arc(sx, sy-10+off, 9, 0, 7); cx.fill();
    cx.fillStyle = "#1c1206"; cx.font = "bold 12px Georgia,serif"; cx.textAlign = "center"; cx.textBaseline = "middle";
    cx.fillText("A", sx, sy-9+off);
    cx.textAlign = "left"; cx.textBaseline = "alphabetic";
  }

  function drawPlayer(sx, sy){
    const bob = inputVector().mag > 0.12 ? 0 : Math.sin(t*0.005)*1.2;
    sy += bob;
    cx.fillStyle = "rgba(0,0,0,.3)"; cx.beginPath(); cx.ellipse(sx, sy, TILE*0.24, TILE*0.1, 0, 0, 7); cx.fill();
    cx.save(); cx.translate(sx, sy); cx.scale(player.face, 1);
    // 망토/튜닉 (십자군 느낌)
    cx.fillStyle = "#c9d2e6"; cx.beginPath();
    cx.moveTo(-9, -10); cx.lineTo(9, -10); cx.lineTo(7, -2); cx.lineTo(-7, -2); cx.closePath(); cx.fill();
    cx.fillStyle = "#e8eefc"; cx.fillRect(-7, -24, 14, 16);          // 몸통(흰 튜닉)
    cx.fillStyle = "#c0392b"; cx.fillRect(-1.5, -22, 3, 11);          // 세로 십자
    cx.fillStyle = "#c0392b"; cx.fillRect(-5, -18, 14, 3);            // 가로 십자
    cx.fillStyle = "#f0c9a0"; cx.beginPath(); cx.arc(0, -28, 5, 0, 7); cx.fill(); // 머리
    cx.fillStyle = "#d7a948"; cx.fillRect(-5, -33, 10, 4);           // 금색 투구띠
    cx.restore();
  }

  function startField(){      // 새 게임 — 상태 초기화
    resetGame();
    resumeField();
    autosave();           // 새 게임 시작 즉시 저장(이어하기 가능)
  }
  function resumeField(){      // 필드로 (전투/대화 후 이어서)
    show("scField");
    sizeCanvas();
    updateGold();
    running = true; last = performance.now();
    cancelAnimationFrame(raf); raf = requestAnimationFrame(loop);
    autosave();           // 전투/이벤트 후 자동 저장
  }
  function updateGold(){ const g = document.getElementById("goldVal"); if (g) g.textContent = prog.gold; }
  function stopField(){ running = false; cancelAnimationFrame(raf); clearInput(); }
  function clearInput(){ keys.up=keys.down=keys.left=keys.right=false; hideJoy(); }

  /* ===== 저장 / 이어하기 (자동 1 + 수동 5슬롯) ===== */
  const SLOTS = ["1","2","3","4","5"];
  const slotKey = s => "dc_slot_" + s;
  function snapshot(){
    return {
      px: player.x, py: player.y, face: player.face, gold: prog.gold, boss: !!prog.bossDefeated, items,
      roster: roster.map(h => ({ key:h.key, lv:h.lv, exp:h.exp, expNext:h.expNext, row:h.row,
        maxHp:h.maxHp, maxMp:h.maxMp, atk:h.atk, def:h.def, mag:h.mag, spd:h.spd, hp:h.hp, mp:h.mp, equip:{...h.equip} })),
      chests: OBJS.map(o => o.type === "chest" ? !!o.opened : null),
    };
  }
  function applySnapshot(s){
    resetGame();
    player.x = s.px; player.y = s.py; player.face = s.face || 1;
    if (s.gold != null) prog.gold = s.gold;
    prog.bossDefeated = !!s.boss;
    if (s.items) items = s.items;
    if (Array.isArray(s.roster)) s.roster.forEach(sv => { const h = roster.find(x => x.key === sv.key); if (h) Object.assign(h, sv); });
    if (Array.isArray(s.chests)) s.chests.forEach((op, i) => { if (op !== null && OBJS[i]) OBJS[i].opened = !!op; });
  }
  function slotMeta(s){ try{ const raw = localStorage.getItem(slotKey(s)); return raw ? (JSON.parse(raw).meta || {}) : null; } catch(e){ return null; } }
  function hasAnySave(){ try{ return ["auto", ...SLOTS].some(s => localStorage.getItem(slotKey(s))); } catch(e){ return false; } }
  function saveToSlot(s, silent){
    if (!roster.length) return false;
    try{
      const lead = roster[0];
      const data = { meta:{ t:Date.now(), gold:prog.gold, lead:`${lead.name} Lv.${lead.lv}`, n:roster.length }, snap:snapshot() };
      localStorage.setItem(slotKey(s), JSON.stringify(data));
      refreshTitle();
      if (!silent) toast(s === "auto" ? "자동 저장됨" : `슬롯 ${s}에 저장했습니다`);
      return true;
    } catch(e){ if (!silent) toast("저장 실패"); return false; }
  }
  function loadFromSlot(s){
    try{ const raw = localStorage.getItem(slotKey(s)); if (!raw) return false; applySnapshot(JSON.parse(raw).snap); return true; }
    catch(e){ return false; }
  }
  const autosave = () => saveToSlot("auto", true);

  // 슬롯 화면
  let _slotMode = "save", _slotBack = "field";
  function openSlots(mode, back){ _slotMode = mode; _slotBack = back; if (back === "field") stopField(); renderSlots(); show("scSlots"); }
  function renderSlots(){
    document.getElementById("slotTitle").textContent = _slotMode === "load" ? "불러오기" : "저장하기";
    const list = document.getElementById("slotList"); list.innerHTML = "";
    const slots = _slotMode === "load" ? ["auto", ...SLOTS] : SLOTS;
    slots.forEach(s => {
      const m = slotMeta(s), name = s === "auto" ? "자동 저장" : "슬롯 " + s;
      const row = document.createElement("button"); row.className = "slotrow" + (m ? "" : " empty");
      row.innerHTML = `<span class="sl-name">${name}</span><span class="sl-meta">${ m ? `${m.lead} · 골드 ${m.gold} · ${new Date(m.t).toLocaleString()}` : "— 비어 있음 —" }</span>`;
      if (_slotMode === "load"){ if (m) row.onclick = () => { if (loadFromSlot(s)){ resumeField(); toast("불러왔습니다"); } }; else row.disabled = true; }
      else row.onclick = () => { if (saveToSlot(s, false)) renderSlots(); };
      list.appendChild(row);
    });
  }
  function slotsBack(){ if (_slotBack === "menu") backToMenu(); else if (_slotBack === "title"){ refreshTitle(); show("scTitle"); } else resumeField(); }

  /* ===== 메뉴(FF/테일즈식) — 통합 진입 ===== */
  const JOBS = { gwangmin:"용사", leon:"성기사", gangwoo:"권사", aria:"마법사", mir:"사제", jihun:"궁수", sera:"도적", daon:"창기사" };
  function portraitHTML(h){
    const img = h.sprites ? `<img class="pf-img" src="${h.sprites.idle}" onload="this.closest('.eq-portrait').classList.add('hasimg')" onerror="this.remove()">` : "";
    return `${img}<span class="pf-emo">${h.emoji}</span>`;
  }
  function openGameMenu(){ stopField(); renderGameMenu(); show("scMenu"); }
  function backToMenu(){ renderGameMenu(); show("scMenu"); }
  const ROW_BADGE = { front:"전열", back:"후열", reserve:"대기" };
  function renderGameMenu(){
    document.getElementById("menuGold").textContent = prog.gold;
    const loc = document.getElementById("menuLoc"); if (loc) loc.textContent = prog.bossDefeated ? "북부 숲길 (정화됨)" : "북부 숲길";
    const cmds = [["status","📊 스테이터스"],["equip","🎒 장비"],["items","🧪 아이템"],["party","👥 배치"],["save","💾 저장"],["close","✖ 닫기"]];
    const mc = document.getElementById("menuCmds"); mc.innerHTML = "";
    cmds.forEach(([k,l]) => { const b = document.createElement("button"); b.className = "mcmd"; b.textContent = l;
      b.onclick = () => ({ status:()=>openStatus(), equip:()=>openEquip("weapon"), items:()=>openEquip("consumable"),
        party:()=>openParty(), save:()=>openSlots("save","menu"), close:()=>resumeField() }[k]());
      mc.appendChild(b); });
    const mp = document.getElementById("menuParty"); mp.innerHTML = "";
    roster.forEach((h, i) => { const d = document.createElement("button"); d.className = "mp-row r-" + h.row;
      d.innerHTML = `<span class="eq-portrait mini"><span class="pf-emo">${h.emoji}</span></span>
        <span class="mp-info"><b>${h.name}</b> <span class="mp-job">${JOBS[h.key]||""}</span> <span class="mp-badge">${ROW_BADGE[h.row]}</span>
          <span class="mp-line">Lv.${h.lv}　HP ${h.hp}/${eStat(h,"maxHp")}　MP ${h.mp}/${eStat(h,"maxMp")}</span>
          <span class="mp-bars"><i class="hp" style="width:${h.hp/eStat(h,"maxHp")*100}%"></i></span></span>`;
      d.onclick = () => { _stHero = i; openStatus(); };   // 멤버 탭하면 스테이터스로
      mp.appendChild(d); });
  }

  /* ===== 스테이터스 ===== */
  let _stHero = 0;
  function openStatus(){ renderStatus(); show("scStatus"); }
  function renderStatus(){
    const h = roster[_stHero];
    document.getElementById("stName").textContent = `${h.name} — ${JOBS[h.key]||""}`;
    document.getElementById("stPortrait").innerHTML = portraitHTML(h);
    document.getElementById("stInfo").innerHTML =
      `<div class="st-lv">Lv. ${h.lv}</div>
       <div class="st-ex">EXP ${h.exp} / ${h.expNext}</div>
       <div class="st-bar"><i style="width:${h.exp/h.expNext*100}%"></i></div>
       <div class="st-hp">HP ${h.hp} / ${eStat(h,"maxHp")}　MP ${h.mp} / ${eStat(h,"maxMp")}</div>
       <div class="st-row2">${h.row==="reserve"?"대기":h.row==="front"?"전열":"후열"}</div>`;
    document.getElementById("stStats").innerHTML = ["atk","def","mag","spd"].map(k => {
      const bon = eBonus(h,k); return `<div class="strow"><span>${STAT_LABEL[k]}</span><span>${eStat(h,k)}${bon?` <em>(${bon>0?"+":""}${bon})</em>`:""}</span></div>`;
    }).join("");
    document.getElementById("stEquip").innerHTML = EQ_SLOTS.map(slot => {
      const id = h.equip[slot], it = id ? DB[id] : null;
      return `<div class="st-eqrow"><span class="se-lab">${EQ_LABEL[slot]}</span><span class="se-val">${it?`${it.icon} ${it.name}`:"—"}</span></div>`;
    }).join("");
  }

  /* ===== 장비 / 인벤토리 (디아블로식 장비창) ===== */
  let _eqHero = 0, _eqTab = "weapon";
  const ARMOR_SLOTS = ["head","body","gloves","boots","shield","accessory"];
  function equipItem(h, id){ const it = DB[id]; if (!it || it.type === "consumable" || !items[id]) return;
    const slot = it.type, cur = h.equip[slot];
    items[id]--; if (items[id] <= 0) delete items[id];
    if (cur){ items[cur] = (items[cur]||0) + 1; }
    h.equip[slot] = id; clampHpMp(h); autosave(); }
  function unequipSlot(h, slot){ const cur = h.equip[slot]; if (!cur) return; items[cur] = (items[cur]||0)+1; h.equip[slot] = null; clampHpMp(h); autosave(); }
  function useItemField(h, id){ const it = DB[id]; if (!it || it.type !== "consumable" || !items[id]) return false;
    if (it.heal) h.hp = Math.min(eStat(h,"maxHp"), h.hp + it.heal);
    if (it.mp)   h.mp = Math.min(eStat(h,"maxMp"), h.mp + it.mp);
    items[id]--; if (items[id] <= 0) delete items[id]; autosave(); return true; }
  function gearScore(h, it){ if (!it || !it.bonus) return 0; const b = it.bonus, aw = h.g==="mag"?1:3, mw = h.g==="mag"?3:1;
    return (b.atk||0)*aw + (b.mag||0)*mw + (b.def||0)*2 + (b.maxHp||0)*0.2 + (b.maxMp||0)*0.2 + (b.spd||0); }
  function autoBest(h){
    let changed = 0;
    for (const slot of EQ_SLOTS){
      const cands = Object.keys(items).filter(id => items[id] > 0 && DB[id] && DB[id].type === slot);
      if (h.equip[slot]) cands.push(h.equip[slot]);
      if (!cands.length) continue;
      let best = h.equip[slot], bestSc = h.equip[slot] ? gearScore(h, DB[h.equip[slot]]) : -1;
      for (const id of cands){ const sc = gearScore(h, DB[id]); if (sc > bestSc){ bestSc = sc; best = id; } }
      if (best && best !== h.equip[slot]){ equipItem(h, best); changed++; }
    }
    toast(changed ? `${h.name} — 최강 장비 ${changed}곳 장착!` : "이미 최적 장비예요");
  }
  function openEquip(tab){ _eqTab = tab || "weapon"; renderEquip(); show("scEquip"); }
  function renderEquip(){
    const h = roster[_eqHero];
    document.getElementById("eqPortrait").innerHTML = portraitHTML(h);
    document.getElementById("eqName").textContent = `${h.name}  Lv.${h.lv}`;
    document.getElementById("eqJob").textContent = JOBS[h.key] || "";
    document.getElementById("eqGold").textContent = prog.gold;
    const pd = document.getElementById("paperdoll"); pd.innerHTML = "";
    EQ_SLOTS.forEach(slot => {
      const id = h.equip[slot], it = id ? DB[id] : null;
      const d = document.createElement("button"); d.className = "pslot" + (it ? " filled" : ""); d.style.gridArea = slot;
      d.innerHTML = it ? `<span class="pi">${it.icon}</span><span class="pl">${it.name}</span>`
                       : `<span class="pi dim">＋</span><span class="pl dim">${EQ_LABEL[slot]}</span>`;
      d.onclick = () => { if (it){ unequipSlot(h, slot); renderEquip(); } };
      pd.appendChild(d);
    });
    document.getElementById("eqStats").innerHTML = ["atk","def","mag","maxHp","maxMp","spd"].map(k => {
      const base = h[k]||0, bon = eBonus(h,k);
      return `<div class="strow"><span>${STAT_LABEL[k]}</span><span>${base+bon}${bon?` <em>(${bon>0?"+":""}${bon})</em>`:""}</span></div>`;
    }).join("");
    const tabs = [["weapon","무기"],["armor","방어구"],["consumable","아이템"]];
    const tb = document.getElementById("eqTabs"); tb.innerHTML = "";
    tabs.forEach(([k,l]) => { const b = document.createElement("button"); b.className = "eqtab" + (_eqTab===k?" on":""); b.textContent = l;
      b.onclick = () => { _eqTab = k; renderEquip(); }; tb.appendChild(b); });
    const match = id => { const t = DB[id].type; return _eqTab === "weapon" ? t === "weapon" : _eqTab === "consumable" ? t === "consumable" : ARMOR_SLOTS.includes(t); };
    const list = document.getElementById("invList"); list.innerHTML = "";
    const ids = Object.keys(items).filter(id => items[id] > 0 && DB[id] && match(id));
    if (!ids.length){ list.innerHTML = `<div class="inv-empty">해당 분류 아이템이 없어요</div>`; return; }
    ids.forEach(id => { const it = DB[id]; const row = document.createElement("button"); row.className = "invrow";
      const sub = it.type === "consumable" ? it.desc : `${EQ_LABEL[it.type]} · ${bonusText(it)}`;
      row.innerHTML = `<span class="iv-ic">${it.icon}</span><span class="iv-info"><b>${it.name}</b> ×${items[id]}<span class="iv-sub">${sub}</span></span><span class="iv-act">${it.type==="consumable"?"사용":"장착"}</span>`;
      row.onclick = () => { if (it.type === "consumable"){ if (useItemField(h, id)) toast(`${it.name} 사용`); } else equipItem(h, id); renderEquip(); };
      list.appendChild(row);
    });
  }

  /* ===== 상점 (구매 / 판매) ===== */
  const SHOP_STOCK = ["potion","hipotion","ether","sword","greatsword","staff","bow","helm","cap","plate","robe","gloves","boots","shield","ring","amulet"];
  let _shopTab = "buy";
  function openShop(){ _shopTab = "buy"; renderShop(); show("scShop"); }
  const sellPrice = it => Math.floor((it.price||0) * 0.5);
  function renderShop(){
    document.getElementById("shopGold").textContent = prog.gold;
    const tb = document.getElementById("shopTabs"); tb.innerHTML = "";
    [["buy","구매"],["sell","판매"]].forEach(([k,l]) => { const b = document.createElement("button"); b.className = "eqtab" + (_shopTab===k?" on":""); b.textContent = l; b.onclick = () => { _shopTab = k; renderShop(); }; tb.appendChild(b); });
    const list = document.getElementById("shopList"); list.innerHTML = "";
    if (_shopTab === "buy"){
      SHOP_STOCK.forEach(id => { const it = DB[id]; if (!it) return;
        const row = document.createElement("button"); row.className = "invrow"; const can = prog.gold >= it.price;
        const sub = it.type === "consumable" ? it.desc : `${EQ_LABEL[it.type]} · ${bonusText(it)}`;
        row.innerHTML = `<span class="iv-ic">${it.icon}</span><span class="iv-info"><b>${it.name}</b><span class="iv-sub">${sub}</span></span><span class="iv-act${can?"":" off"}">🪙${it.price}</span>`;
        row.onclick = () => { if (prog.gold < it.price){ toast("골드가 부족해요"); return; } prog.gold -= it.price; items[id] = (items[id]||0)+1; toast(`${it.name} 구매!`); autosave(); renderShop(); };
        list.appendChild(row); });
    } else {
      const ids = Object.keys(items).filter(id => items[id] > 0 && DB[id]);

  // 단일 대상 행동(물리/마법/회복)
  async function act(att, tgt, opt){
    if (opt.kind === "heal"){
      att.el.classList.add("cast"); heroPose(att, "casting"); await delay(280);
      const h = Math.round(eStat(att,"mag")*2.4*opt.power); tgt.hp = Math.min(eStat(tgt,"maxHp"), tgt.hp + h);

    }
    const crit = opt.kind === "phys" && Math.random() < 0.18;

    let d = (opt.kind === "mag" ? magDmg(att,tgt,opt.power) : physDmg(att,tgt,opt.power));

    if (opt.kind === "phys"){

      if (tgt.side === "hero" && tgt.row === "back") d = Math.round(d*0.6);
    }
    if (tgt.defending) d = Math.round(d*0.5);
    tgt.hp -= d;
    sparkAt(tgt, opt.emo || (crit ? "💥" : "✦"));
    popNum(tgt, d, crit ? "crit" : "");
    hurtFx(tgt); shake(crit || d >= 22); updateBattler(tgt);
    if (tgt.side === "hero" && tgt.hp > 0) heroPose(tgt, crit ? "staggered" : "hit");
    if (opt.kind === "mag") att.el.classList.remove("cast");
    if (crit && tgt.hp > 0 && Math.random() < 0.5){ tgt.stun = true; stunOn(tgt); popNum(tgt, "기절!", "miss"); }
    await delay(crit ? 420 : 300);
    restPose(att);
    if (tgt.hp <= 0){ if (tgt.side === "hero") heroPose(tgt, "death"); await die(tgt); }
    else if (tgt.side === "hero") setTimeout(() => restPose(tgt), 360);
  }
  async function castAll(att, ab){
    att.el.classList.add("cast"); await delay(320);
    for (const e of aliveE()){ let d = magDmg(att, e, ab.power); if (e.defending) d = Math.round(d*0.5);
      e.hp -= d; sparkAt(e, ab.emo); popNum(e, d); hurtFx(e); updateBattler(e); }
    shake(true); await delay(440); att.el.classList.remove("cast");
    for (const e of enemies) if (e.hp <= 0 && !e.el.classList.contains("dead")) await die(e);
  }

  // ---- target / menu ----
  function clearTargets(){ [...party, ...enemies].forEach(b => { if (!b.el) return; b.el.classList.remove("targetable"); const s = b.el.querySelector(".spr"); if (s) s.onclick = null; }); }
  function pickTarget(side){
    return new Promise(res => {
      const list = side === "enemy" ? aliveE() : aliveH();
      if (list.length === 1){ res(list[0]); return; }
      setLog("대상을 선택하세요");
      list.forEach(b => { b.el.classList.add("targetable"); b.el.querySelector(".spr").onclick = () => { clearTargets(); res(b); }; });
      renderMenu([{ l:"‹ 취소", sub:true, f:() => { clearTargets(); res(null); } }]);
    });
  }
  function mainMenu(h){
    return new Promise(res => {
      const main = () => renderMenu([
        { l:"공격",      f:() => res({k:"attack"}) },
        { l:"마법·스킬", f:() => renderMenu(abil()) },
        { l:"아이템",    f:() => renderMenu(itm()) },
        { l:"방어",      f:() => res({k:"defend"}) },
        { l:"도망",      f:() => res({k:"flee"}) },
      ]);
      const abil = () => { const l = h.abilities.map(ab => ({ l:`${ab.name}${ab.mp?` ${ab.mp}`:""}`, sub:true, dis:h.mp<ab.mp, f:()=>res({k:"abil", ab}) }));
        l.push({ l:"‹ 뒤로", sub:true, f:main }); return l; };
      const itm = () => { const l = Object.keys(items).filter(k => DB[k] && DB[k].type==="consumable" && items[k]>0)
          .map(k => ({ l:`${DB[k].icon}${DB[k].name}×${items[k]}`, sub:true, f:()=>res({k:"item", item:k}) }));
        if (!l.length) l.push({ l:"(소모품 없음)", sub:true, dis:true, f:()=>{} });
        l.push({ l:"‹ 뒤로", sub:true, f:main }); return l; };
      main();
    });
  }

  async function heroTurn(h){
    setActive(h, true); setLog(h.name + "의 차례 — 명령을 선택");
    while (true){
      const c = await mainMenu(h);
      if (c.k === "defend"){ h.defending = true; heroPose(h, "guard"); clearMenu(); setLog(h.name + " 방어 태세!"); await delay(550); break; }
      if (c.k === "flee"){ clearMenu(); setLog("도망친다…"); await delay(500);
        if (Math.random() < 0.5){ setActive(h,false); return "flee"; } setLog("도망치지 못했다!"); await delay(750); continue; }
      if (c.k === "attack"){ const t = await pickTarget("enemy"); if (!t) continue; clearMenu(); setLog(h.name + "의 공격!"); await act(h, t, {power:1, kind:"phys"}); break; }
      if (c.k === "abil"){ const ab = c.ab; if (h.mp < ab.mp){ continue; }
        if (ab.target === "allEnemies"){ clearMenu(); h.mp -= ab.mp; updateBattler(h); setLog(`${h.name} — ${ab.name}!`); await castAll(h, ab); break; }
        const t = await pickTarget(ab.target === "ally" ? "hero" : "enemy"); if (!t) continue;
        clearMenu(); h.mp -= ab.mp; updateBattler(h); setLog(`${h.name} — ${ab.name}!`);
        await act(h, t, { power:ab.power, kind:ab.kind, emo:ab.emo }); break; }
      if (c.k === "item"){ const k = c.item; if (!items[k]) continue; const it = DB[k];
        const t = await pickTarget("hero"); if (!t) continue; clearMenu();
        items[k]--; if (items[k] <= 0) delete items[k];
        if (it.heal){ t.hp = Math.min(eStat(t,"maxHp"), t.hp + it.heal); popNum(t, "+"+it.heal, "heal"); }
        if (it.mp){ t.mp = Math.min(eStat(t,"maxMp"), t.mp + it.mp); popNum(t, "+"+it.mp, "heal"); }
        sparkAt(t, it.icon); updateBattler(t); setLog(`${it.name} 사용!`); await delay(700); break; }
    }
    setActive(h, false);
  }
  async function enemyAct(e){
    const t = aliveH()[Math.floor(Math.random()*aliveH().length)];
    if (!t) return;
    setLog((e.label||e.name) + "의 공격!");
    await act(e, t, { power:1, kind:"phys" });
  }

  async function battleLoop(){
    while (true){
      const order = [...aliveH(), ...aliveE()].sort((a,b) => eStat(b,"spd") - eStat(a,"spd"));
      for (const a of order){
        if (a.hp <= 0) continue;
        if (!aliveE().length) return victory();
        if (!aliveH().length) return defeat();
        a.defending = false; updateBattler(a); restPose(a);
        if (a.stun){ a.stun = false; stunOff(a); setLog((a.label||a.name) + " 기절 — 행동할 수 없다!"); await delay(850); restPose(a); continue; }
        if (a.side === "hero"){ const r = await heroTurn(a); if (r === "flee"){ setLog("무사히 도망쳤다!"); clearMenu(); await delay(650); B = null; resumeField(); return; } }
        else await enemyAct(a);
        await delay(150);
      }
    }
  }
  async function victory(){
    party.forEach(h => { setActive(h,false); if (h.hp > 0) heroPose(h, "victory"); }); clearMenu();
    const isBoss = enemies.some(e => e.boss);
    const exp = enemies.reduce((s,e)=>s+e.exp,0), gold = enemies.reduce((s,e)=>s+e.gold,0);
    prog.gold += gold;
    // 아이템/장비 드롭
    const drops = [];
    enemies.forEach(e => (e.drops || []).forEach(d => { if (Math.random() < (d.chance||0)){ items[d.id] = (items[d.id]||0)+1; drops.push(DB[d.id] ? DB[d.id].name : d.id); } }));
    const ups = [];
    roster.forEach(h => { const amt = h.row === "reserve" ? Math.round(exp*0.7) : exp; if (gainExp(h, amt)) ups.push(`${h.name} Lv.${h.lv}`); });
    party.forEach(updateBattler);
    if (isBoss) prog.bossDefeated = true;
    let msg = (isBoss ? "👑 보스를 쓰러뜨렸다!<br>" : "승리! ") + `획득 EXP ${exp} · 골드 +${gold}`;
    if (drops.length) msg += `<br>획득: ${drops.join(", ")}`;
    if (ups.length)   msg += `<br>레벨 업: ${ups.join(", ")}`;
    setLog(msg);
    await delay((isBoss || ups.length || drops.length) ? 2300 : 1500); B = null; resumeField();
  }
  async function defeat(){ clearMenu(); setLog("파티가 전멸했다…"); await delay(1700); B = null; refreshTitle(); show("scTitle"); }

  function startBattle(){
    stopField();
    party = battleParty();                 // 출전 파티(전열/후열, 최대 6)
    const n = 1 + Math.floor(Math.random()*3);
    enemies = [];
    for (let i = 0; i < n; i++){ const d = ENEMY_DEF[Math.floor(Math.random()*ENEMY_DEF.length)];
      enemies.push({ ...d, side:"enemy", hp:d.maxHp, mp:0, defending:false, stun:false, el:null }); }
    // 동명 적 구분(A/B/C)
    const cnt = {}; enemies.forEach(e => cnt[e.name] = (cnt[e.name]||0)+1);
    const seen = {}; enemies.forEach(e => { if (cnt[e.name] > 1){ seen[e.name] = (seen[e.name]||0); e.label = e.name + " " + "ABC"[seen[e.name]]; seen[e.name]++; } else e.label = e.name; });
    buildBattlers();
    show("scBattle");
    setLog(n > 1 ? "적 무리가 나타났다!" : `${enemies[0].name}이(가) 나타났다!`);
    B = { on:true };
    battleLoop();
  }
  function startBoss(o){
    stopField();
    _bossObj = o || null;
    party = battleParty();
    enemies = [ { ...BOSS, side:"enemy", hp:BOSS.maxHp, mp:0, defending:false, stun:false, el:null, label:BOSS.name } ];
    buildBattlers();
    show("scBattle");
    setLog(`${BOSS.name}이(가) 앞을 가로막는다!`);
    B = { on:true, boss:true };
    battleLoop();
  }

  refreshTitle();
  show("scTitle");
</script>
</body>
