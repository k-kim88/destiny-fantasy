<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0e1f">
<title>데스티니 크루세이더</title>
<style>
  /* ===== 리셋 / 테마 ===== */
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{
    --bg-0:#070a16; --bg-1:#0e1430; --bg-2:#172352;
    --gold:#e6c074; --gold-dim:#b8924a; --gold-line:rgba(230,192,116,.5);
    --ink:#eef2ff; --muted:#9fb0d8; --faint:#5f6f9c;
    --panel:rgba(12,20,46,.72); --line:#27325a;
    --serif:"Iowan Old Style","Apple SD Gothic Neo",Georgia,"Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  }
  html,body{height:100%;}
  body{
    font-family:var(--sans); color:var(--ink);
    background:var(--bg-0);
    display:flex; align-items:center; justify-content:center;
    min-height:100dvh; overflow:hidden; -webkit-font-smoothing:antialiased;
  }
  /* 모바일 프레임 */
  #app{
    position:relative; width:100%; max-width:460px; height:100dvh; overflow:hidden;
    background:
      radial-gradient(120% 70% at 50% -5%, var(--bg-2) 0%, var(--bg-1) 45%, var(--bg-0) 80%);
  }
  #app::after{ /* 비네트 */
    content:""; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(110% 80% at 50% 40%, transparent 55%, rgba(0,0,0,.55) 100%);
  }

  .screen{position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; padding:30px; text-align:center;
    animation:fade .35s ease;}
  .screen.hidden{display:none;}
  @keyframes fade{from{opacity:0}to{opacity:1}}

  /* ===== 타이틀 로고 ===== */
  .logo{user-select:none; margin-bottom:6px;}
  .logo .word{display:block; font-family:var(--serif); font-weight:800; line-height:.96;
    letter-spacing:.06em; font-size:46px;
    background:linear-gradient(180deg,#fff7da 0%,#f0d28c 38%,#d7a948 54%,#9c6f2e 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    -webkit-text-fill-color:transparent;
    text-shadow:0 1px 0 rgba(0,0,0,.3);}
  .logo .word.small{font-size:40px;}
  .rule{display:flex; align-items:center; justify-content:center; gap:10px; margin:14px 0 2px;}
  .rule .ln{height:1px; width:54px; background:linear-gradient(90deg,transparent,var(--gold-line));}
  .rule .ln.r{background:linear-gradient(90deg,var(--gold-line),transparent);}
  .rule .gem{width:9px; height:9px; transform:rotate(45deg);
    background:linear-gradient(135deg,#fff3c8,var(--gold-dim)); box-shadow:0 0 8px rgba(230,192,116,.5);}
  .sub-ko{font-family:var(--serif); font-size:19px; letter-spacing:.34em; color:var(--gold);
    padding-left:.34em;}
  .tagline{color:var(--muted); font-size:12.5px; letter-spacing:.06em; margin-top:6px;}

  /* ===== 메뉴 ===== */
  .menu{margin-top:30px; width:100%; max-width:280px; display:flex; flex-direction:column; gap:10px;}
  .menu .item{
    appearance:none; width:100%; font-family:var(--serif); font-size:17px; font-weight:600;
    color:var(--ink); background:var(--panel); border:1px solid var(--gold-line);
    padding:13px 18px; border-radius:10px; cursor:pointer; letter-spacing:.04em;
    -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
    transition:transform .08s ease, color .15s, border-color .15s, background .15s;
  }
  .menu .item:active{transform:scale(.98);}
  .menu .item.primary{color:#1c1206;
    background:linear-gradient(180deg,#f0d28c,#d7a948); border-color:#f0d28c;}
  .menu .item.disabled{color:var(--faint); border-color:var(--line); cursor:default; background:transparent;}

  .foot{position:absolute; bottom:16px; left:0; right:0; text-align:center;
    color:var(--faint); font-size:10.5px; letter-spacing:.16em;}

  /* placeholder 화면 */
  .ph-title{font-family:var(--serif); font-size:24px; color:var(--gold); letter-spacing:.08em;}
  .ph-text{color:var(--muted); font-size:14px; line-height:1.8; max-width:300px;}
  .back{appearance:none; margin-top:8px; background:transparent; border:1px solid var(--gold-line);
    color:var(--gold); font-size:14px; padding:10px 22px; border-radius:9px; cursor:pointer;}

  /* 토스트 */
  #toast{position:absolute; bottom:64px; left:50%; transform:translateX(-50%);
    background:rgba(12,20,46,.96); border:1px solid var(--gold-line); color:var(--ink);
    padding:10px 18px; border-radius:10px; font-size:13px; opacity:0;
    transition:opacity .25s ease; pointer-events:none; max-width:86%; z-index:30;}

  /* ===== 필드(탐험) 화면 ===== */
  #scField{padding:0; gap:0; justify-content:flex-start;}
  #fieldCanvas{position:absolute; inset:0; width:100%; height:100%; display:block;
    image-rendering:auto; touch-action:none;}
  /* 상단 위치 패널 */
  .hud{position:absolute; top:14px; left:14px; z-index:10;
    background:var(--panel); border:1px solid var(--gold-line); border-radius:9px;
    padding:7px 13px; -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);}
  .hud .kick{font-size:9px; letter-spacing:.2em; color:var(--gold-dim);}
  .hud .loc{font-family:var(--serif); font-size:14px; color:var(--gold); letter-spacing:.04em;}
  .hud-back{position:absolute; top:14px; right:14px; z-index:10;
    background:var(--panel); border:1px solid var(--gold-line); color:var(--gold);
    font-size:13px; padding:7px 12px; border-radius:9px; cursor:pointer;}

  /* 가상 조이스틱 (떠다니는 방식 · 반투명) — 누른 자리에 생성 */
  #joyBase{position:absolute; z-index:10; width:148px; height:148px; border-radius:50%;
    transform:translate(-50%,-50%); pointer-events:none; touch-action:none;
    opacity:0; transition:opacity .12s ease;
    background:radial-gradient(circle, rgba(150,170,230,.13), rgba(40,55,110,.20));
    border:1px solid rgba(230,192,116,.4);
    -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px);}
  #joyBase.on{opacity:.78;}
  #joyBase::before{content:""; position:absolute; inset:40px; border-radius:50%;
    border:1px dashed rgba(230,192,116,.28);}
  #joyKnob{position:absolute; left:50%; top:50%; width:66px; height:66px; border-radius:50%;
    transform:translate(-50%,-50%); pointer-events:none;
    background:radial-gradient(circle at 50% 38%, rgba(255,243,200,.72), rgba(201,154,63,.5));
    border:1px solid rgba(245,220,160,.7);
    box-shadow:0 3px 10px rgba(0,0,0,.32), inset 0 1px 3px rgba(255,255,255,.4);}

  /* A버튼(확인) */
  #aBtn{position:absolute; right:26px; bottom:42px; z-index:10;
    width:62px; height:62px; border-radius:50%; font-family:var(--serif); font-weight:700;
    color:#1c1206; background:linear-gradient(180deg,#f0d28c,#d7a948); border:1px solid #f5dca0;
    font-size:20px; cursor:pointer;}
  #aBtn:active{transform:scale(.96);}
  #aBtn.hint{box-shadow:0 0 0 3px rgba(230,192,116,.55), 0 0 18px rgba(230,192,116,.6);}

  /* 대화창 */
  #dialog{position:absolute; left:0; right:0; bottom:0; z-index:20; padding:14px;}
  #dialog.hidden{display:none;}
  .dlg-box{position:relative; background:rgba(9,14,32,.97); border:1px solid var(--gold-line);
    border-radius:12px; padding:13px 16px 16px; min-height:92px;
    box-shadow:0 -6px 24px rgba(0,0,0,.4);}
  .dlg-name{font-family:var(--serif); color:var(--gold); font-size:14px; letter-spacing:.06em; margin-bottom:8px;}
  .dlg-text{color:var(--ink); font-size:15px; line-height:1.62;}
  .dlg-next{position:absolute; right:14px; bottom:9px; color:var(--gold); font-size:13px; animation:blink 1.1s infinite;}
  @keyframes blink{50%{opacity:.15}}

  /* ===== 전투 ===== */
  #scBattle{padding:0; gap:0; justify-content:flex-start;
    background:radial-gradient(120% 70% at 50% 0%, #281c44 0%, #140d26 55%, #08060f 100%);}
  .bt-top{flex:1; width:100%; position:relative; display:flex; align-items:center; justify-content:center;}
  .bt-enemy{text-align:center; transition:opacity .5s, transform .5s;}
  .bt-enemy.hit{animation:btshake .3s;}
  @keyframes btshake{0%,100%{transform:translateX(0)}25%{transform:translateX(-9px)}75%{transform:translateX(9px)}}
  .bt-enemy.dead{opacity:0; transform:scale(.6) translateY(12px);}
  .bt-emo{font-size:88px; line-height:1; filter:drop-shadow(0 6px 10px rgba(0,0,0,.5));}
  .bt-ename{font-family:var(--serif); color:var(--ink); font-size:15px; margin-top:8px; letter-spacing:.04em;}
  .ebar{width:150px; height:8px; margin:8px auto 0; background:rgba(0,0,0,.5);
    border:1px solid var(--line); border-radius:4px; overflow:hidden;}
  .ebar > i{display:block; height:100%; background:linear-gradient(180deg,#e2574a,#a32f2a); transition:width .3s;}
  .bt-flash{position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none;}
  .bt-flash.on{animation:fl .2s ease;}
  @keyframes fl{30%{opacity:.5}100%{opacity:0}}
  .bt-msg{width:100%; padding:13px 18px; min-height:54px; color:var(--ink); font-size:14.5px; line-height:1.5;
    background:rgba(9,14,32,.92); border-top:1px solid var(--gold-line); border-bottom:1px solid var(--gold-line);}
  .bt-player{width:100%; padding:12px 18px 2px;}
  .bt-prow{display:flex; justify-content:space-between; align-items:baseline;
    font-family:var(--serif); color:var(--ink); font-size:15px;}
  .bt-prow .lv{color:var(--gold); font-size:12px;}
  .pbar{height:12px; margin-top:6px; background:rgba(0,0,0,.5); border:1px solid var(--line); border-radius:6px; overflow:hidden;}
  .pbar > i{display:block; height:100%; background:linear-gradient(180deg,#5fce7a,#2f8a48); transition:width .3s;}
  .bt-hp{text-align:right; font-size:12px; color:var(--muted); margin-top:3px;}
  .bt-cmds{width:100%; padding:10px 16px 20px; display:grid; grid-template-columns:repeat(3,1fr); gap:9px;}
  .bt-cmds button{font-family:var(--serif); font-size:16px; font-weight:600; color:#1c1206;
    background:linear-gradient(180deg,#f0d28c,#d7a948); border:1px solid #f5dca0; border-radius:10px; padding:13px 0; cursor:pointer;}
  .bt-cmds button:active{transform:scale(.97);}
  .bt-cmds button:disabled{opacity:.38; cursor:default;}
</style>
</head>
<body>
<div id="app">

  <!-- ===== 타이틀 화면 ===== -->
  <section class="screen" id="scTitle">
    <div class="logo">
      <span class="word">DESTINY</span>
      <span class="word small">CRUSADER</span>
    </div>
    <div class="rule"><span class="ln"></span><span class="gem"></span><span class="ln r"></span></div>
    <div class="sub-ko">데스티니 크루세이더</div>
    <div class="tagline">운명을 건 십자군의 모험</div>

    <div class="menu">
      <button class="item primary" data-a="new">새 게임</button>
      <button class="item disabled" data-a="cont">이어하기</button>
      <button class="item" data-a="settings">설정</button>
    </div>
    <div class="foot">© 2026 · DESTINY CRUSADER · Ver 0.1</div>
  </section>

  <!-- ===== 필드(탐험) 화면 ===== -->
  <section class="screen hidden" id="scField">
    <canvas id="fieldCanvas"></canvas>
    <div class="hud"><div class="kick">NORTHERN WOODS</div><div class="loc">북부 숲길</div></div>
    <button class="hud-back" data-a="back">타이틀 ›</button>
    <div id="joyBase"><div id="joyKnob"></div></div>
    <button id="aBtn">A</button>
    <div id="dialog" class="hidden">
      <div class="dlg-box">
        <div class="dlg-name" id="dlgName"></div>
        <div class="dlg-text" id="dlgText"></div>
        <div class="dlg-next">▼</div>
      </div>
    </div>
  </section>

  <!-- ===== 전투 화면 ===== -->
  <section class="screen hidden" id="scBattle">
    <div class="bt-top">
      <div class="bt-enemy" id="btEnemy">
        <div class="bt-emo" id="enemyEmo">🟢</div>
        <div class="bt-ename" id="enemyName">슬라임</div>
        <div class="ebar"><i id="enemyHp" style="width:100%"></i></div>
      </div>
      <div class="bt-flash" id="btFlash"></div>
    </div>
    <div class="bt-msg" id="btMsg"></div>
    <div class="bt-player">
      <div class="bt-prow"><span>크루세이더</span><span class="lv" id="pLv">Lv.1</span></div>
      <div class="pbar"><i id="pHpBar" style="width:100%"></i></div>
      <div class="bt-hp" id="pHpText">60 / 60</div>
    </div>
    <div class="bt-cmds" id="btCmds">
      <button data-c="attack">공격</button>
      <button data-c="defend">방어</button>
      <button data-c="flee">도망</button>
    </div>
  </section>

  <!-- ===== 임시(다음 단계) 화면 ===== -->
  <section class="screen hidden" id="scPlaceholder">
    <div class="logo"><span class="word small">DESTINY</span></div>
    <div class="ph-title" id="phTitle">준비 중</div>
    <div class="ph-text" id="phText">이 부분은 다음 단계에서 만듭니다.</div>
    <button class="back" data-a="back">‹ 타이틀로</button>
  </section>

  <div id="toast"></div>
</div>

<script>
  "use strict";
  const $  = (s) => document.querySelector(s);
  const $$ = (s) => document.querySelectorAll(s);

  function toast(msg){
    const el = $("#toast");
    el.textContent = msg; el.style.opacity = 1;
    clearTimeout(el._t); el._t = setTimeout(() => el.style.opacity = 0, 1600);
  }

  // 아주 단순한 화면 전환기 — 여기서부터 화면을 늘려갑니다.
  function show(id){
    $$(".screen").forEach(s => s.classList.toggle("hidden", s.id !== id));
  }

  function openPlaceholder(title, text){
    $("#phTitle").textContent = title;
    $("#phText").innerHTML = text;
    show("scPlaceholder");
  }

  // 타이틀 메뉴
  $$("#scTitle .item").forEach(btn => btn.addEventListener("click", () => {
    const a = btn.dataset.a;
    if (a === "new")       startField();
    else if (a === "cont") toast("저장된 모험이 아직 없어요");
    else if (a === "settings") openPlaceholder("설정", "사운드 · 언어 등 설정을 다음 단계에서 추가합니다.");
  }));

  // 뒤로
  $$('[data-a="back"]').forEach(b => b.addEventListener("click", () => { stopField(); show("scTitle"); }));

  /* =========================================================================
     STEP 2 — 필드(탐험): 타일 맵 · 이동 · 충돌 · 카메라
     ========================================================================= */
  // 0 풀, 1 나무(막힘), 2 물(막힘), 3 길, 4 꽃
  const MAP = [
    "1111111111111111",
    "1000000000000001",
    "1000011000000001",
    "1000011000033001",
    "1004000000033001",
    "1000000000033001",
    "1000000220033001",
    "1000002220033001",
    "1000002200033001",
    "1000000000033001",
    "1003333333333001",
    "1003000000000001",
    "1003000110000041",
    "1003000110000001",
    "1003000000000001",
    "1003000000044001",
    "1003000000044001",
    "1000000000000001",
    "1000011000001101",
    "1000011000001101",
    "1000000000000001",
    "1111111111111111",
  ].map(r => r.split("").map(Number));
  const ROWS = MAP.length, COLS = MAP[0].length, TILE = 40;
  const WALK = new Set([0, 3, 4]);
  const clamp = (v, a, b) => v < a ? a : v > b ? b : v;

  const cv = $("#fieldCanvas");
  const cx = cv.getContext("2d");
  let VW = 0, VH = 0, dpr = 1;
  function sizeCanvas(){
    dpr = Math.min(2, window.devicePixelRatio || 1);
    VW = cv.clientWidth; VH = cv.clientHeight;
    cv.width = Math.round(VW * dpr); cv.height = Math.round(VH * dpr);
    cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  // 플레이어 (월드 좌표 px)
  const player = { x: 8 * TILE + TILE / 2, y: 4 * TILE + TILE / 2, face: 1 };
  const keys = { up:false, down:false, left:false, right:false };       // 키보드
  const joy  = { active:false, x:0, y:0, id:null, cxp:0, cyp:0 };        // 가상 조이스틱(-1..1)
  const cam = { x: 0, y: 0 };

  // ===== 상호작용 오브젝트 (NPC · 표지판 · 보물상자) =====
  const OBJS = [
    { c:8,  r:2,  type:"npc",  solid:true, name:"마을 사람",
      lines:["여행자시군요. 이 북부 숲길엔 요즘 마물이 자주 나와요.",
             "조심해서 가세요, 크루세이더."] },
    { c:12, r:11, type:"sign", solid:true, name:"표지판",
      lines:["▲ 북 — 옛 성터 / ▼ 남 — 마을<br>“길을 잃으면 별을 보라.”"] },
    { c:5,  r:15, type:"chest", solid:true, name:"보물상자",
      opened:false, gold:120, item:"포션" },
  ];
  const objWX = (o) => o.c * TILE + TILE / 2;        // 중심 x
  const objFY = (o) => o.r * TILE + TILE;            // 발치 y(바닥선)
  function solidHit(px, py){
    for (const o of OBJS){
      if (!o.solid) continue;
      if (Math.abs(px - objWX(o)) < TILE*0.42 && Math.abs(py - (objFY(o) - TILE*0.4)) < TILE*0.40) return true;
    }
    return false;
  }
  function canWalk(px, py){ return tileWalk(px, py) && !solidHit(px, py); }
  function nearestObj(){
    let best = null, bd = TILE * 1.25;
    for (const o of OBJS){
      const d = Math.hypot(objWX(o) - player.x, (objFY(o) - TILE*0.5) - player.y);
      if (d < bd){ bd = d; best = o; }
    }
    return best;
  }

  // ===== 대화창 =====
  const dlg = { open:false, lines:[], i:0, onDone:null };
  function openDialog(name, lines, onDone){
    dlg.open = true; dlg.lines = lines; dlg.i = 0; dlg.onDone = onDone || null;
    document.getElementById("dlgName").textContent = name;
    document.getElementById("dlgText").innerHTML = lines[0];
    document.getElementById("dialog").classList.remove("hidden");
    hideJoy();
  }
  function advanceDialog(){
    dlg.i++;
    if (dlg.i >= dlg.lines.length){
      document.getElementById("dialog").classList.add("hidden");
      dlg.open = false;
      const cb = dlg.onDone; dlg.onDone = null; if (cb) cb();
      return;
    }
    document.getElementById("dlgText").innerHTML = dlg.lines[dlg.i];
  }
  function interact(o){
    player.face = (objWX(o) > player.x) ? 1 : -1;
    if (o.type === "chest"){
      if (o.opened){ openDialog(o.name, ["텅 비어 있다."]); return; }
      o.opened = true;
      openDialog(o.name, ["보물상자를 열었다!", `${o.item} 와(과) 골드 ${o.gold} 을(를) 얻었다.`]);
    } else {
      openDialog(o.name, o.lines);
    }
  }
  function pressA(){
    if (dlg.open){ advanceDialog(); return; }
    const o = nearestObj();
    if (o) interact(o);
    else toast("주변에 살펴볼 것이 없어요");
  }

  // 현재 입력 벡터 (조이스틱 우선, 없으면 키보드). 크기는 0..1
  function inputVector(){
    let x = joy.x, y = joy.y;
    if (!joy.active){
      x = (keys.right?1:0) - (keys.left?1:0);
      y = (keys.down?1:0)  - (keys.up?1:0);
      const m = Math.hypot(x, y); if (m > 1){ x /= m; y /= m; }
    }
    return { x, y, mag: Math.min(1, Math.hypot(x, y)) };
  }

  function tileWalk(px, py){
    const c = Math.floor(px / TILE), r = Math.floor(py / TILE);
    return r >= 0 && r < ROWS && c >= 0 && c < COLS && WALK.has(MAP[r][c]);
  }

  let raf = 0, last = 0, running = false, t = 0;
  function loop(ts){
    if (!running) return;
    const dt = Math.min(40, ts - last || 16); last = ts; t = ts;

    // 이동 (조이스틱/키보드 — 아날로그, 세기에 비례한 속도)
    const inp = inputVector();
    if (!dlg.open && inp.mag > 0.12){
      const vx = inp.x, vy = inp.y;
      if (Math.abs(vx) > 0.05) player.face = vx > 0 ? 1 : -1;
      const sp = TILE * 0.062 * (dt / 16);
      const nx = player.x + vx * sp;
      if (canWalk(nx + (vx>0?TILE*0.28:vx<0?-TILE*0.28:0), player.y + TILE*0.30)) player.x = nx;
      const ny = player.y + vy * sp;
      if (canWalk(player.x, ny + (vy>0?TILE*0.34:-TILE*0.10))) player.y = ny;

      // 랜덤 인카운터 (풀밭에서만)
      const tc = Math.floor(player.x/TILE), tr = Math.floor(player.y/TILE);
      if (tr>=0 && tr<ROWS && tc>=0 && tc<COLS && MAP[tr][tc]===0){
        _enc += sp * inp.mag;
        if (_enc >= _encNext){ _enc = 0; _encNext = TILE*(4+Math.random()*5);
          startBattle(ENEMIES[Math.floor(Math.random()*ENEMIES.length)]); return; }
      }
    }

    // 가까운 상호작용 대상 → A버튼 강조
    const near = dlg.open ? null : nearestObj();
    document.getElementById("aBtn").classList.toggle("hint", !!near);

    // 카메라 (플레이어 중심, 맵 경계 클램프)
    const worldW = COLS*TILE, worldH = ROWS*TILE;
    cam.x = worldW <= VW ? (worldW-VW)/2 : clamp(player.x - VW/2, 0, worldW-VW);
    cam.y = worldH <= VH ? (worldH-VH)/2 : clamp(player.y - VH*0.46, 0, worldH-VH);

    draw();
    raf = requestAnimationFrame(loop);
  }

  function draw(){
    cx.clearRect(0, 0, VW, VH);
    cx.fillStyle = "#0d1a14"; cx.fillRect(0, 0, VW, VH);
    const c0 = Math.max(0, Math.floor(cam.x/TILE)), c1 = Math.min(COLS-1, Math.ceil((cam.x+VW)/TILE));
    const r0 = Math.max(0, Math.floor(cam.y/TILE)), r1 = Math.min(ROWS-1, Math.ceil((cam.y+VH)/TILE));
    // 바닥 타일
    for (let r=r0; r<=r1; r++) for (let c=c0; c<=c1; c++){
      const tile = MAP[r][c], x = c*TILE-cam.x, y = r*TILE-cam.y;
      if (tile === 2){ cx.fillStyle = "#1d4e8c"; cx.fillRect(x,y,TILE,TILE);
        cx.fillStyle = "rgba(190,225,240,.12)"; cx.fillRect(x+4, y+TILE*0.4+Math.sin(t*0.003+c)*2, TILE-8, 1); }
      else if (tile === 3){ cx.fillStyle = "#7a6243"; cx.fillRect(x,y,TILE,TILE); }
      else { cx.fillStyle = ((r+c)&1) ? "#2f5a32" : "#346134"; cx.fillRect(x,y,TILE,TILE); }
      if (tile === 4){ cx.fillStyle = "#e6c074"; cx.beginPath(); cx.arc(x+TILE*0.5, y+TILE*0.5, 3, 0, 7); cx.fill();
        cx.fillStyle = "#d97fae"; cx.beginPath(); cx.arc(x+TILE*0.32, y+TILE*0.62, 2.4, 0, 7); cx.fill(); }
    }
    // 깊이 정렬: 나무 + 상호작용 오브젝트 + 플레이어
    const items = [];
    for (let r=r0; r<=r1+1; r++) for (let c=c0; c<=c1; c++){
      if (r<0||r>=ROWS||MAP[r][c]!==1) continue;
      const wx = c*TILE+TILE/2, wy = r*TILE+TILE;
      items.push({ fy:wy, draw:()=>drawTree(wx-cam.x, wy-cam.y) });
    }
    for (const o of OBJS) items.push({ fy:objFY(o), draw:()=>drawObj(o) });
    items.push({ fy:player.y, draw:()=>drawPlayer(player.x-cam.x, player.y-cam.y) });
    items.sort((a,b)=>a.fy-b.fy);
    for (const it of items) it.draw();

    // 상호작용 마커 (가까운 대상 위 'A')
    const near = nearestObj();
    if (near && !dlg.open) drawMarker(objWX(near)-cam.x, objFY(near)-TILE-cam.y);
    // 가장자리 어둡게
    const g = cx.createLinearGradient(0,0,0,VH);
    g.addColorStop(0,"rgba(8,12,28,.45)"); g.addColorStop(.2,"rgba(0,0,0,0)");
    g.addColorStop(.82,"rgba(0,0,0,0)"); g.addColorStop(1,"rgba(5,8,20,.5)");
    cx.fillStyle = g; cx.fillRect(0,0,VW,VH);
  }

  function drawTree(sx, sy){
    cx.fillStyle = "rgba(0,0,0,.25)"; cx.beginPath(); cx.ellipse(sx, sy-3, TILE*0.32, TILE*0.12, 0, 0, 7); cx.fill();
    cx.fillStyle = "#4a3420"; cx.fillRect(sx-3, sy-TILE*0.7, 6, TILE*0.7);
    cx.fillStyle = "#244625"; cx.beginPath(); cx.arc(sx, sy-TILE*0.95, TILE*0.5, 0, 7); cx.fill();
    cx.fillStyle = "#356134"; cx.beginPath(); cx.arc(sx-5, sy-TILE*1.05, TILE*0.38, 0, 7); cx.fill();
    cx.fillStyle = "#4d8a4f"; cx.beginPath(); cx.arc(sx-TILE*0.18, sy-TILE*1.2, TILE*0.2, 0, 7); cx.fill();
  }

  function shadow(sx, sy, w){ cx.fillStyle = "rgba(0,0,0,.26)"; cx.beginPath(); cx.ellipse(sx, sy-2, w, w*0.4, 0, 0, 7); cx.fill(); }

  function drawObj(o){
    const sx = objWX(o) - cam.x, sy = objFY(o) - cam.y;
    if (o.type === "npc") drawNPC(sx, sy);
    else if (o.type === "sign") drawSign(sx, sy);
    else if (o.type === "chest") drawChest(sx, sy, o.opened);
  }
  function drawNPC(sx, sy){
    shadow(sx, sy, TILE*0.22);
    cx.fillStyle = "#3d6b4a"; cx.beginPath();                       // 망토
    cx.moveTo(sx-8,sy-10); cx.lineTo(sx+8,sy-10); cx.lineTo(sx+6,sy-1); cx.lineTo(sx-6,sy-1); cx.closePath(); cx.fill();
    cx.fillStyle = "#5f9e6e"; cx.fillRect(sx-6, sy-22, 12, 14);     // 몸
    cx.fillStyle = "#caa24a"; cx.fillRect(sx-6, sy-12, 12, 2);      // 허리띠
    cx.fillStyle = "#f0c9a0"; cx.beginPath(); cx.arc(sx, sy-26, 4.6, 0, 7); cx.fill(); // 머리
    cx.fillStyle = "#8a5a32"; cx.fillRect(sx-5, sy-31, 10, 4);      // 머리카락/두건
  }
  function drawSign(sx, sy){
    shadow(sx, sy, TILE*0.2);
    cx.fillStyle = "#5b4128"; cx.fillRect(sx-2, sy-22, 4, 22);      // 기둥
    cx.fillStyle = "#7e5a32"; cx.fillRect(sx-13, sy-30, 26, 13);    // 판
    cx.fillStyle = "#3a2a18"; cx.fillRect(sx-13, sy-30, 26, 2);
    cx.fillStyle = "#caa24a"; cx.fillRect(sx-9, sy-26, 18, 1.6);    // 글씨 느낌
    cx.fillRect(sx-9, sy-23, 12, 1.6);
  }
  function drawChest(sx, sy, opened){
    shadow(sx, sy, TILE*0.2);
    cx.fillStyle = "#6e4a24"; cx.fillRect(sx-12, sy-15, 24, 15);    // 몸통
    cx.fillStyle = "#8a5e30"; cx.fillRect(sx-12, sy-15, 24, 4);
    cx.fillStyle = "#d7a948";                                       // 금속 띠
    cx.fillRect(sx-12, sy-9, 24, 2); cx.fillRect(sx-1.5, sy-15, 3, 15);
    if (!opened){
      cx.fillStyle = "#7e5630"; cx.beginPath();                     // 닫힌 뚜껑
      cx.moveTo(sx-12, sy-15); cx.lineTo(sx-12, sy-21); cx.quadraticCurveTo(sx, sy-26, sx+12, sy-21); cx.lineTo(sx+12, sy-15); cx.closePath(); cx.fill();
      cx.fillStyle = "#f0d28c"; cx.fillRect(sx-2, sy-13, 4, 4);     // 자물쇠
    } else {
      cx.fillStyle = "#2a1c10"; cx.fillRect(sx-10, sy-15, 20, 4);   // 열린 내부(어둠)
      cx.fillStyle = "#7e5630"; cx.beginPath();                     // 열린 뚜껑(뒤로)
      cx.moveTo(sx-12, sy-15); cx.lineTo(sx-12, sy-21); cx.quadraticCurveTo(sx, sy-31, sx+12, sy-26); cx.lineTo(sx+12, sy-19); cx.closePath(); cx.fill();
    }
  }
  function drawMarker(sx, sy){
    const p = 0.5 + 0.5*Math.sin(t*0.006), off = -p*3;
    cx.fillStyle = `rgba(230,192,116,${0.85})`;
    cx.beginPath(); cx.arc(sx, sy-10+off, 9, 0, 7); cx.fill();
    cx.fillStyle = "#1c1206"; cx.font = "bold 12px Georgia,serif"; cx.textAlign = "center"; cx.textBaseline = "middle";
    cx.fillText("A", sx, sy-9+off);
    cx.textAlign = "left"; cx.textBaseline = "alphabetic";
  }

  function drawPlayer(sx, sy){
    const bob = inputVector().mag > 0.12 ? 0 : Math.sin(t*0.005)*1.2;
    sy += bob;
    cx.fillStyle = "rgba(0,0,0,.3)"; cx.beginPath(); cx.ellipse(sx, sy, TILE*0.24, TILE*0.1, 0, 0, 7); cx.fill();
    cx.save(); cx.translate(sx, sy); cx.scale(player.face, 1);
    // 망토/튜닉 (십자군 느낌)
    cx.fillStyle = "#c9d2e6"; cx.beginPath();
    cx.moveTo(-9, -10); cx.lineTo(9, -10); cx.lineTo(7, -2); cx.lineTo(-7, -2); cx.closePath(); cx.fill();
    cx.fillStyle = "#e8eefc"; cx.fillRect(-7, -24, 14, 16);          // 몸통(흰 튜닉)
    cx.fillStyle = "#c0392b"; cx.fillRect(-1.5, -22, 3, 11);          // 세로 십자
    cx.fillStyle = "#c0392b"; cx.fillRect(-5, -18, 14, 3);            // 가로 십자
    cx.fillStyle = "#f0c9a0"; cx.beginPath(); cx.arc(0, -28, 5, 0, 7); cx.fill(); // 머리
    cx.fillStyle = "#d7a948"; cx.fillRect(-5, -33, 10, 4);           // 금색 투구띠
    cx.restore();
  }

  function startField(){      // 새 게임 — 상태 초기화
    resetGame();
    resumeField();
  }
  function resumeField(){      // 필드로 (전투/대화 후 이어서)
    show("scField");
    sizeCanvas();
    running = true; last = performance.now();
    cancelAnimationFrame(raf); raf = requestAnimationFrame(loop);
  }
  function stopField(){ running = false; cancelAnimationFrame(raf); clearInput(); }
  function clearInput(){ keys.up=keys.down=keys.left=keys.right=false; hideJoy(); }

  // ===== 떠다니는 가상 조이스틱 (캔버스 아무 곳이나 누르면 그 자리에 생성) =====
  const app = $("#app"), joyBase = $("#joyBase"), joyKnob = $("#joyKnob"), JOY_R = 58;
  function resetKnob(){ joyKnob.style.transform = "translate(-50%,-50%)"; }
  function hideJoy(){ joy.active = false; joy.x = joy.y = 0; joyBase.classList.remove("on"); resetKnob(); }
  function joyMove(clientX, clientY){
    let dx = clientX - joy.cxp, dy = clientY - joy.cyp;
    const d = Math.hypot(dx, dy);
    if (d > JOY_R){ dx = dx / d * JOY_R; dy = dy / d * JOY_R; }
    joy.x = dx / JOY_R; joy.y = dy / JOY_R;
    joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
  }
  cv.addEventListener("pointerdown", e => {
    if (dlg.open) return;                 // 대화 중엔 조이스틱 생성 안 함
    e.preventDefault();
    joy.active = true; joy.id = e.pointerId;
    joy.cxp = e.clientX; joy.cyp = e.clientY;
    const r = app.getBoundingClientRect();
    joyBase.style.left = (e.clientX - r.left) + "px";
    joyBase.style.top  = (e.clientY - r.top)  + "px";
    joyBase.classList.add("on");
    resetKnob();
  });
  document.addEventListener("pointermove", e => { if (joy.active && e.pointerId === joy.id) joyMove(e.clientX, e.clientY); });
  const joyEnd = e => { if (joy.active && e.pointerId === joy.id) hideJoy(); };
  document.addEventListener("pointerup", joyEnd);
  document.addEventListener("pointercancel", joyEnd);

  // ===== 키보드 =====
  const KEY = { ArrowUp:"up", ArrowDown:"down", ArrowLeft:"left", ArrowRight:"right", w:"up", s:"down", a:"left", d:"right" };
  const ACTION_KEYS = new Set([" ", "Enter", "e", "z"]);
  document.addEventListener("keydown", e => {
    if (!running) return;
    if (KEY[e.key]){ e.preventDefault(); keys[KEY[e.key]] = true; }
    else if (ACTION_KEYS.has(e.key)){ e.preventDefault(); pressA(); }
  });
  document.addEventListener("keyup",   e => { if (KEY[e.key]) keys[KEY[e.key]] = false; });

  $("#aBtn").addEventListener("click", () => pressA());
  // 대화창 어디든 탭하면 다음으로
  document.getElementById("dialog").addEventListener("pointerdown", e => { e.preventDefault(); advanceDialog(); });
  window.addEventListener("resize", () => { if (running) sizeCanvas(); });

  /* =========================================================================
     STEP 4 — 턴제 전투
     ========================================================================= */
  const START = { x: player.x, y: player.y };
  const P = { lv:1, hp:60, maxHp:60, atk:14, def:6, exp:0, expNext:20, gold:0 };
  const ENEMIES = [
    { name:"슬라임", emo:"🟢", hp:30, atk:10, def:3, exp:8,  gold:6  },
    { name:"박쥐",   emo:"🦇", hp:22, atk:13, def:1, exp:9,  gold:5  },
    { name:"고블린", emo:"👺", hp:48, atk:16, def:6, exp:18, gold:15 },
  ];
  let B = null, _enc = 0, _encNext = TILE * 5;
  const rnd = (a, b) => a + Math.random() * (b - a);

  function resetGame(){
    player.x = START.x; player.y = START.y; player.face = 1;
    P.lv=1; P.hp=P.maxHp=60; P.atk=14; P.def=6; P.exp=0; P.expNext=20; P.gold=0;
    OBJS.forEach(o => { if (o.type === "chest") o.opened = false; });
    _enc = 0; _encNext = TILE * 5;
  }

  const $id = (i) => document.getElementById(i);
  function setBars(){
    $id("pHpBar").style.width = Math.max(0, P.hp/P.maxHp*100) + "%";
    $id("pHpText").textContent = Math.max(0, P.hp) + " / " + P.maxHp;
    $id("pLv").textContent = "Lv." + P.lv;
    if (B) $id("enemyHp").style.width = Math.max(0, B.hp/B.maxHp*100) + "%";
  }
  const btMsg = (s) => { $id("btMsg").innerHTML = s; };
  const cmds  = (on) => document.querySelectorAll("#btCmds button").forEach(b => b.disabled = !on);
  const dmgCalc = (atk, dfn) => Math.max(1, Math.round(atk - dfn*0.6 + rnd(-2, 2)));
  function flashEnemy(){
    const f = $id("btFlash"); f.classList.remove("on"); void f.offsetWidth; f.classList.add("on");
    const e = $id("btEnemy"); e.classList.remove("hit"); void e.offsetWidth; e.classList.add("hit");
  }

  function startBattle(def){
    stopField();
    B = { ...def, maxHp: def.hp, defending:false, busy:false, over:false };
    $id("enemyEmo").textContent = def.emo;
    $id("enemyName").textContent = def.name;
    $id("btEnemy").classList.remove("dead");
    show("scBattle"); setBars(); cmds(true);
    btMsg(`${def.name}이(가) 나타났다!`);
  }
  function playerCmd(c){
    if (!B || B.busy || B.over) return;
    B.busy = true; cmds(false); B.defending = false;
    if (c === "attack"){
      const d = dmgCalc(P.atk, B.def); B.hp -= d; flashEnemy(); setBars();
      btMsg(`크루세이더의 공격! ${B.name}에게 ${d} 피해.`);
      setTimeout(() => { (B.hp <= 0) ? victory() : enemyTurn(); }, 720);
    } else if (c === "defend"){
      B.defending = true; btMsg("방어 자세! (받는 피해 감소)");
      setTimeout(enemyTurn, 600);
    } else if (c === "flee"){
      if (Math.random() < 0.55){ btMsg("무사히 도망쳤다!"); setTimeout(endBattle, 700); }
      else { btMsg("도망치지 못했다!"); setTimeout(enemyTurn, 700); }
    }
  }
  function enemyTurn(){
    if (B.over) return;
    let d = dmgCalc(B.atk, P.def); if (B.defending) d = Math.round(d * 0.5);
    P.hp -= d; setBars();
    btMsg(`${B.name}의 공격! 크루세이더가 ${d} 피해.`);
    setTimeout(() => {
      if (P.hp <= 0) defeat();
      else { B.busy = false; cmds(true); btMsg("무엇을 할까?"); }
    }, 760);
  }
  function victory(){
    B.over = true; $id("btEnemy").classList.add("dead");
    P.exp += B.exp; P.gold += B.gold;
    let msg = `${B.name}을(를) 쓰러뜨렸다!<br>EXP +${B.exp} · 골드 +${B.gold}`, lvUp = false;
    while (P.exp >= P.expNext){ P.exp -= P.expNext; P.lv++; P.maxHp += 12; P.hp = P.maxHp; P.atk += 3; P.def += 2; P.expNext = Math.round(P.expNext * 1.5); lvUp = true; }
    setBars(); if (lvUp) msg += `<br>레벨 업! Lv.${P.lv} (HP/공격/방어 상승)`;
    btMsg(msg);
    setTimeout(endBattle, lvUp ? 1700 : 1400);
  }
  function defeat(){
    B.over = true; btMsg("크루세이더는 쓰러졌다…");
    setTimeout(() => { B = null; show("scTitle"); }, 1700);
  }
  function endBattle(){ B = null; resumeField(); }

  document.querySelectorAll("#btCmds button").forEach(b => b.addEventListener("click", () => playerCmd(b.dataset.c)));

  show("scTitle");
</script>
</body>
</html>
