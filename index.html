<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b1020">
<title>새 프로젝트</title>
<style>
  /* ===== 기본 리셋 ===== */
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{
    --bg:#0b1020; --panel:#141b33; --line:#26314f;
    --text:#eaf0ff; --muted:#8fa0c8; --accent:#7aa2ff;
  }
  html,body{height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    background:var(--bg); color:var(--text);
    display:flex; align-items:center; justify-content:center;
    min-height:100dvh; overflow:hidden;
  }
  /* 모바일 화면 프레임 (전체 화면을 채움) */
  #app{
    position:relative; width:100%; max-width:460px; height:100dvh;
    display:flex; flex-direction:column;
    background:radial-gradient(120% 80% at 50% 0%, #16203f 0%, var(--bg) 60%);
  }

  /* ===== 화면 ===== */
  .screen{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px; padding:28px; text-align:center;}

  .logo{font-size:34px; font-weight:800; letter-spacing:.04em; line-height:1.15;}
  .logo span{color:var(--accent);}
  .tagline{color:var(--muted); font-size:14px; letter-spacing:.02em;}

  .btn{
    appearance:none; border:1px solid var(--line); background:var(--panel);
    color:var(--text); font-size:16px; font-weight:600;
    padding:14px 30px; border-radius:12px; cursor:pointer;
    transition:transform .08s ease, border-color .15s ease, background .15s ease;
  }
  .btn:active{transform:scale(.97);}
  .btn.primary{background:linear-gradient(180deg,#3f63c8,#2a47a0); border-color:#4f6fce;}

  .foot{padding:16px; text-align:center; color:var(--muted); font-size:11px; letter-spacing:.08em;}

  /* 토스트 */
  #toast{
    position:absolute; bottom:80px; left:50%; transform:translateX(-50%);
    background:rgba(20,27,51,.95); border:1px solid var(--line); color:var(--text);
    padding:10px 18px; border-radius:10px; font-size:13px; opacity:0;
    transition:opacity .25s ease; pointer-events:none;
  }
</style>
</head>
<body>
<div id="app">
  <!-- 화면이 여기에 렌더링됩니다 -->
  <section class="screen" id="screen">
    <div class="logo">새 <span>프로젝트</span></div>
    <div class="tagline">백지에서 한 단계씩 만들어 갑니다</div>
    <button class="btn primary" id="startBtn">시작</button>
  </section>
  <div class="foot">STEP 0 · 시작점</div>
  <div id="toast"></div>
</div>

<script>
  "use strict";
  // 아주 작은 유틸 — 여기서부터 단계적으로 키워갑니다.
  const $ = (s) => document.querySelector(s);
  function toast(msg) {
    const el = $("#toast");
    el.textContent = msg;
    el.style.opacity = 1;
    clearTimeout(el._t);
    el._t = setTimeout(() => (el.style.opacity = 0), 1500);
  }

  $("#startBtn").addEventListener("click", () => {
    toast("여기서부터 만들어 가요 — 다음에 무엇을 추가할지 알려주세요!");
  });
</script>
</body>
</html>
