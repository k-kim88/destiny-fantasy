<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0a0d14">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>데스티니 전대 — 게이트 인베이전</title>
<style>
  :root{ --gold:#e6c074; --red:#c0392b; --pink:#ff7ab0; --blue:#3b6db5; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
  html,body{ margin:0; height:100%; overflow:hidden; background:#05070c;
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif; color:#e8edf5; }
  #game{ position:fixed; inset:0; touch-action:none; display:block; }
  /* ---- HUD ---- */
  #hud{ position:fixed; inset:0; pointer-events:none; padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
  .bar{ position:absolute; left:10px; right:10px; }
  #xpwrap{ top:8px; height:14px; background:#0d1320cc; border:1px solid #2a3650; border-radius:8px; overflow:hidden; }
  #xpfill{ height:100%; width:0%; background:linear-gradient(90deg,#5fd0ff,#3b8de0); transition:width .12s; }
  #toprow{ position:absolute; top:26px; left:10px; right:10px; display:flex; justify-content:space-between; align-items:center; font-weight:700; font-size:13px; text-shadow:0 1px 2px #000; }
  #lvchip{ background:#1a2740cc; border:1px solid #38507e; border-radius:20px; padding:3px 10px; color:var(--gold); }
  #timer{ font-size:22px; font-variant-numeric:tabular-nums; color:#fff; }
  #killchip{ background:#2a161acc; border:1px solid #6e2b2b; border-radius:20px; padding:3px 10px; color:#ff9a8a; }
  #hpwrap{ position:absolute; top:54px; left:10px; width:46%; height:13px; background:#170d10cc; border:1px solid #5a2530; border-radius:8px; overflow:hidden; }
  #hpfill{ height:100%; width:100%; background:linear-gradient(90deg,#ff5a5a,#c0392b); transition:width .1s; }
  #hptext{ position:absolute; top:53px; left:12px; font-size:10px; font-weight:800; text-shadow:0 1px 2px #000; }
  #morphchip{ position:absolute; top:53px; right:10px; font-size:11px; font-weight:800; background:#1a1330cc; border:1px solid #4a3a6e; border-radius:20px; padding:3px 10px; color:#d9c2ff; text-shadow:0 1px 2px #000; }
  #weprow{ position:absolute; top:72px; left:10px; display:flex; gap:4px; }
  .wepicon{ width:26px; height:26px; border-radius:7px; background:#0e1422cc; border:1px solid #2a3650; display:flex; align-items:center; justify-content:center; font-size:14px; position:relative; }
  .wepicon b{ position:absolute; right:-3px; bottom:-5px; font-size:9px; background:var(--gold); color:#23170a; border-radius:6px; padding:0 3px; font-weight:800; }
  /* ---- overlays ---- */
  .overlay{ position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:24px; overflow-y:auto;
    background:radial-gradient(120% 120% at 50% 0%, #121a2eee, #05070cf2); z-index:20; }
  .hidden{ display:none !important; }
  h1{ font-size:28px; margin:0 0 4px; letter-spacing:.04em;
    background:linear-gradient(180deg,#fff,#e6c074); -webkit-background-clip:text; background-clip:text; color:transparent; text-shadow:0 2px 10px #0008; }
  .sub{ color:#9fb0c8; font-size:13px; line-height:1.6; max-width:360px; margin:6px 0 18px; }
  .btn{ pointer-events:auto; cursor:pointer; border:none; border-radius:14px; padding:14px 30px; font-size:17px; font-weight:800; color:#1a1206;
    background:linear-gradient(180deg,#f0d089,#e0b14e); box-shadow:0 6px 18px #0007, inset 0 1px 0 #fff8; }
  .btn:active{ transform:translateY(2px); }
  .btn.sec{ background:#1d2640; color:#cdd8ec; box-shadow:0 4px 12px #0006; margin-top:10px; }
  /* cards (levelup + select) */
  #lvtitle{ color:var(--gold); font-size:20px; font-weight:800; margin-bottom:14px; letter-spacing:.05em; }
  #cards,#charlist{ display:flex; flex-direction:column; gap:11px; width:100%; max-width:380px; }
  .card{ pointer-events:auto; cursor:pointer; display:flex; align-items:center; gap:14px; text-align:left;
    background:linear-gradient(180deg,#172138,#0f1626); border:1px solid #32507e; border-radius:14px; padding:13px 15px; box-shadow:0 5px 16px #0006; }
  .card:active{ transform:scale(.98); border-color:var(--gold); }
  .card.locked{ opacity:.45; cursor:default; filter:grayscale(.7); }
  .card .ic{ font-size:28px; width:50px; height:50px; flex:none; display:flex; align-items:center; justify-content:center; background:#0a1020; border-radius:12px; border:1px solid #2a3650; }
  .card .nm{ font-size:16px; font-weight:800; }
  .card .nm small{ color:var(--gold); font-weight:800; margin-left:6px; }
  .card .ds{ font-size:12px; color:#9fb0c8; margin-top:3px; line-height:1.4; }
  .card .tags{ margin-top:5px; display:flex; gap:5px; flex-wrap:wrap; }
  .tag{ font-size:10px; font-weight:700; background:#0a1224; border:1px solid #2a3650; border-radius:6px; padding:1px 6px; color:#bcd; }
  .statbig{ font-size:34px; font-weight:800; color:#fff; }
  .stat{ color:#cdd8ec; font-size:13px; margin:2px 0; }
  #pausebtn{ pointer-events:auto; position:absolute; bottom:calc(14px + env(safe-area-inset-bottom)); right:14px; width:42px; height:42px; border-radius:11px;
    background:#0e1422cc; border:1px solid #2a3650; color:#cdd8ec; font-size:15px; display:flex; align-items:center; justify-content:center; }
  #joyhint{ position:absolute; left:0; bottom:14%; width:100%; text-align:center; color:#7f8ba3; font-size:12px; opacity:0; transition:opacity .4s; }
  .credit{ color:#52607a; font-size:11px; margin-top:14px; }
  #titlegold{ font-size:16px; font-weight:800; color:var(--gold); margin-bottom:12px; }
  /* shop rows */
  .shoprow{ display:flex; align-items:center; gap:12px; text-align:left; width:100%;
    background:linear-gradient(180deg,#172138,#0f1626); border:1px solid #32507e; border-radius:14px; padding:11px 14px; }
  .shoprow .ic{ font-size:24px; width:44px; height:44px; flex:none; display:flex; align-items:center; justify-content:center; background:#0a1020; border-radius:11px; border:1px solid #2a3650; }
  .shoprow .nm{ font-size:15px; font-weight:800; }
  .shoprow .ds{ font-size:11px; color:#9fb0c8; margin-top:2px; }
  .shoprow .pips{ margin-top:4px; letter-spacing:2px; font-size:10px; color:#4a6ea8; }
  .shoprow .pips b{ color:var(--gold); }
  .buybtn{ pointer-events:auto; cursor:pointer; flex:none; border:none; border-radius:10px; padding:9px 12px; font-size:13px; font-weight:800; color:#1a1206;
    background:linear-gradient(180deg,#f0d089,#e0b14e); min-width:74px; text-align:center; }
  .buybtn:active{ transform:translateY(1px); }
  .buybtn.off{ background:#1d2640; color:#5d6b85; cursor:default; }
  .buybtn.max{ background:#1d3a2a; color:#7fd0a0; cursor:default; }
  /* roulette */
  #reels{ display:flex; gap:10px; justify-content:center; margin:6px 0 12px; flex-wrap:wrap; }
  .reel{ width:74px; height:84px; border-radius:14px; background:linear-gradient(180deg,#1a2236,#0d1424);
    border:2px solid #32507e; display:flex; align-items:center; justify-content:center; font-size:40px; overflow:hidden; box-shadow:inset 0 0 18px #0008; }
  .reel.lock{ border-color:var(--gold); box-shadow:0 0 16px #e6c07488, inset 0 0 10px #0006; animation:pop .25s; }
  @keyframes pop{ 0%{transform:scale(1.18);} 100%{transform:scale(1);} }
  /* select portrait canvas */
  .pcv{ width:50px; height:56px; }
  .stagethumb{ width:50px; height:50px; border-radius:10px; object-fit:cover; border:1px solid #2a3650; flex:none; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud" class="hidden">
  <div id="xpwrap" class="bar"><div id="xpfill"></div></div>
  <div id="toprow"><span id="lvchip">Lv 1</span><span id="timer">0:00</span><span id="killchip">☠ 0</span></div>
  <div id="hpwrap"><div id="hpfill"></div></div>
  <div id="hptext">100 / 100</div>
  <div id="morphchip">변신까지 3:00</div>
  <div id="weprow"></div>
  <div id="pausebtn">❚❚</div>
  <div id="joyhint">아무 곳이나 드래그해 이동 · 공격은 자동</div>
</div>

<!-- title -->
<div id="title" class="overlay">
  <div style="position:absolute;top:calc(10px + env(safe-area-inset-top));right:12px;display:flex;gap:6px">
    <button class="btn sec" id="langbtn" style="padding:7px 12px;font-size:13px;margin:0">日本語</button>
    <button class="btn sec" id="mutebtn" style="padding:7px 12px;font-size:13px;margin:0">🔊</button>
  </div>
  <h1>데스티니 전대</h1>
  <div id="tagline" style="color:#e6c074;font-weight:700;letter-spacing:.28em;font-size:12px;margin-bottom:6px">게이트 인베이전</div>
  <p class="sub" id="titlestory"></p>
  <div id="titlegold">💰 0</div>
  <button class="btn" id="startbtn">전대 소집</button>
  <button class="btn sec" id="shopbtn">강화 상점</button>
  <button class="btn sec" id="howbtn">조작법</button>
  <div class="credit" id="creditline">v5.0 — 전대 디펜스</div>
</div>

<!-- shop (meta progression) -->
<div id="shop" class="overlay hidden">
  <h1 style="font-size:23px" id="shopT">강화 상점</h1>
  <p class="sub" id="shopS">획득한 골드로 전대원을 영구 강화한다.<br>모든 캐릭터에 적용된다.</p>
  <div id="shopgold" style="font-size:18px;font-weight:800;color:var(--gold);margin-bottom:12px">💰 0</div>
  <div id="shoplist"></div>
  <button class="btn sec" id="shopback">← 뒤로</button>
</div>

<!-- character select -->
<div id="select" class="overlay hidden">
  <h1 style="font-size:23px" id="selT">전사 선택</h1>
  <p class="sub" id="selS">함께 싸울 전대원을 선택하라.<br>5분 생존 시 각성하여 변신한다.</p>
  <div id="charlist"></div>
  <button class="btn sec" id="backbtn">← 뒤로</button>
</div>

<!-- stage select -->
<div id="stage" class="overlay hidden">
  <h1 style="font-size:23px" id="stT">전장 선택</h1>
  <p class="sub" id="stS">게이트가 열린 장소를 선택하라.</p>
  <div id="stagelist"></div>
  <button class="btn sec" id="stageback">← 캐릭터 다시</button>
</div>

<!-- levelup -->
<div id="levelup" class="overlay hidden">
  <div id="lvtitle">⚔ 레벨 업! 보상을 선택하라</div>
  <div id="cards"></div>
</div>

<!-- boss roulette -->
<div id="roulette" class="overlay hidden">
  <div id="rltitle" style="color:#ffd86a;font-size:20px;font-weight:800;margin-bottom:14px;letter-spacing:.05em">🎰 보스 격파! 전리품 룰렛</div>
  <div id="reels"></div>
  <div id="rewardnames" class="sub" style="min-height:20px"></div>
  <button class="btn hidden" id="rouletteGo">획득</button>
</div>

<!-- gameover -->
<div id="over" class="overlay hidden">
  <h1 id="overttl">전투 불능</h1>
  <p class="sub" id="overmsg"></p>
  <div style="margin:6px 0 18px">
    <div class="stat">생존 시간 <span class="statbig" id="ov_time">0:00</span></div>
    <div class="stat">처치 <b id="ov_kill" style="color:#ff9a8a">0</b> · 레벨 <b id="ov_lv" style="color:var(--gold)">1</b></div>
    <div class="stat" id="ov_gold" style="color:var(--gold);font-weight:800;margin-top:8px">💰 +0</div>
  </div>
  <button class="btn" id="retrybtn">다시 도전</button>
  <button class="btn sec" id="tohome">캐릭터 다시 선택</button>
</div>

<script>
"use strict";
/* ============================================================
   데스티니 전대 — 게이트 인베이전
   전대 디펜스 (Vampire-Survivors 식). 캐릭터 선택 → 3분 생존 시 변신.
   ============================================================ */
const cv=document.getElementById("game"), cx=cv.getContext("2d");
const TILE=40; let W=0,H=0,DPR=1;
function resize(){ DPR=Math.min(window.devicePixelRatio||1,2); W=window.innerWidth; H=window.innerHeight;
  cv.width=Math.floor(W*DPR); cv.height=Math.floor(H*DPR); cv.style.width=W+"px"; cv.style.height=H+"px"; cx.setTransform(DPR,0,0,DPR,0,0); }
window.addEventListener("resize",resize); resize();

const rand=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const dist2=(ax,ay,bx,by)=>{const dx=ax-bx,dy=ay-by;return dx*dx+dy*dy;};
const TAU=Math.PI*2;
function fmtTime(ms){const s=Math.max(0,Math.floor(ms/1000));return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");}

/* ---------- input ---------- */
const keys={};
addEventListener("keydown",e=>{keys[e.key.toLowerCase()]=true;});
addEventListener("keyup",e=>{keys[e.key.toLowerCase()]=false;});
const joy={active:false,id:null,ox:0,oy:0,x:0,y:0};
function jStart(id,x,y){joy.active=true;joy.id=id;joy.ox=x;joy.oy=y;joy.x=x;joy.y=y;}
function jMove(x,y){joy.x=x;joy.y=y;}
function jEnd(){joy.active=false;joy.id=null;}
cv.addEventListener("touchstart",e=>{e.preventDefault();const t=e.changedTouches[0];if(!joy.active)jStart(t.identifier,t.clientX,t.clientY);},{passive:false});
cv.addEventListener("touchmove",e=>{e.preventDefault();for(const t of e.changedTouches){if(t.identifier===joy.id)jMove(t.clientX,t.clientY);}},{passive:false});
cv.addEventListener("touchend",e=>{e.preventDefault();for(const t of e.changedTouches){if(t.identifier===joy.id)jEnd();}},{passive:false});
cv.addEventListener("touchcancel",()=>jEnd(),{passive:false});
let mouseDown=false;
cv.addEventListener("mousedown",e=>{mouseDown=true;jStart("m",e.clientX,e.clientY);});
addEventListener("mousemove",e=>{if(mouseDown)jMove(e.clientX,e.clientY);});
addEventListener("mouseup",()=>{mouseDown=false;jEnd();});
function inputVector(){
  let x=0,y=0;
  if(keys["a"]||keys["arrowleft"])x-=1; if(keys["d"]||keys["arrowright"])x+=1;
  if(keys["w"]||keys["arrowup"])y-=1; if(keys["s"]||keys["arrowdown"])y+=1;
  if(joy.active){const dx=joy.x-joy.ox,dy=joy.y-joy.oy,d=Math.hypot(dx,dy); if(d>6){const m=Math.min(d,46)/46;x=dx/d*m;y=dy/d*m;}}
  const mag=Math.hypot(x,y); if(mag>1){x/=mag;y/=mag;} return {x,y,mag:Math.min(mag,1)};
}

/* ============================================================
   DATA
   ============================================================ */
const MORPH_MS=5*60*1000, BOSS_MS=20*60*1000;   // 5분 변신, 20분에 스테이지 보스

const WEAPONS={
  rifle:   {name:"소총 연사", ja:"ライフル連射", evo:"발컨 개틀링", evoja:"ガトリング砲", icon:"🔫", max:10, excl:true},
  grenade: {name:"수류탄", ja:"手榴弾", evo:"융단 폭격", evoja:"絨毯爆撃", icon:"💣", max:10, excl:true},
  sonic:   {name:"음파 마이크", ja:"音波マイク", evo:"디바의 절규", evoja:"ディーヴァの叫び", icon:"🎤", max:10, excl:true},
  sparkle: {name:"반짝임", ja:"きらめき", evo:"천사의 가호", evoja:"天使の加護", icon:"✨", max:10, excl:true},
  fist:    {name:"베어너클", ja:"ベアナックル", evo:"광폭의 발톱", evoja:"狂暴の爪", icon:"🐾", max:10, excl:true},
  slam:    {name:"대지 강타", ja:"大地強打", evo:"지진 파동", evoja:"地震波", icon:"💥", max:10, excl:true},
  blade:   {name:"에너지 블레이드", ja:"エネルギーブレード", evo:"폭풍의 검", evoja:"嵐の剣", icon:"🗡️", max:10},
  drone:   {name:"수호 드론", ja:"守護ドローン", evo:"드론 군단", evoja:"ドローン軍団", icon:"🛸", max:10},
  aura:    {name:"수호 오라", ja:"守護オーラ", evo:"성역", evoja:"聖域", icon:"🌀", max:10},
  dogs:    {name:"보네와레몬", ja:"ボネとレモン", evo:"질풍 듀오", evoja:"疾風デュオ", icon:"🐶", max:10},
  bolt:    {name:"낙뢰", ja:"落雷", evo:"폭풍 강림", evoja:"嵐の降臨", icon:"⚡", max:10},
  frost:   {name:"서리 파편", ja:"氷の礫", evo:"절대영도", evoja:"絶対零度", icon:"❄️", max:10},
};
const PASSIVES={
  might:  {name:"공격력 강화", ja:"攻撃力強化", icon:"💢", max:5, desc:"공격력 +15%", descja:"攻撃力 +15%"},
  speed:  {name:"신속", ja:"俊足", icon:"🥾", max:5, desc:"이동속도 +12%", descja:"移動速度 +12%"},
  area:   {name:"광역 확장", ja:"範囲拡張", icon:"💠", max:5, desc:"범위 +14%", descja:"範囲 +14%"},
  haste:  {name:"속사", ja:"速射", icon:"⏱️", max:5, desc:"쿨다운 -10%", descja:"クールダウン -10%"},
  magnet: {name:"자력", ja:"磁力", icon:"🧲", max:5, desc:"수집 범위 +28%", descja:"取得範囲 +28%"},
  vigor:  {name:"강철 체력", ja:"鋼の体力", icon:"❤️", max:5, desc:"최대 체력 +25 · 회복", descja:"最大HP +25・回復"},
};
const CHARS={
  gwangmin:{ key:"gwangmin", name:"광민", ja:"グァンミン", role:"한국 군인", roleja:"韓国軍人", emoji:"🪖",
    desc:"소총으로 무장한 베테랑 병사. 수류탄으로 적진을 쓸어버린다.", descja:"ライフルを操る歴戦の兵士。手榴弾で敵陣を一掃する。",
    base:"rifle", signature:"grenade", morphName:"김치레드", morphja:"キムチレッド", swatch:"#c0392b",
    sheet:"gwangmin", morphSheet:"kimchired",
    draw:(x,y)=>drawGwangmin(x,y), drawMorph:(x,y)=>drawKimchiRed(x,y) },
  akane:{ key:"akane", name:"아카네", ja:"アカネ", role:"일본 아이돌", roleja:"日本アイドル", emoji:"🎤",
    desc:"음파 마이크로 노래하며 싸운다. 반짝임으로 자신을 지킨다.", descja:"音波マイクで歌い戦う。きらめきで身を守る。",
    base:"sonic", signature:"sparkle", morphName:"사몬핑크", morphja:"サーモンピンク", swatch:"#ff7ab0",
    sheet:"akane", morphSheet:"samonpink",
    draw:(x,y)=>drawAkane(x,y), drawMorph:(x,y)=>drawSalmonPink(x,y) },
  minmin:{ key:"minmin", name:"민민", ja:"ミンミン", role:"각성한 야수", roleja:"覚醒した野獣", emoji:"🐻",
    desc:"베어너클로 할퀴고 대지를 강타하는 곰 전사.", descja:"ベアナックルで引き裂き、大地を打ち砕く熊戦士。",
    base:"fist", signature:"slam", morphName:"골드베어", morphja:"ゴールドベア", swatch:"#d9a23a",
    sheet:"minmin", morphSheet:"goldbear",
    draw:(x,y)=>drawGwangmin(x,y), drawMorph:(x,y)=>drawGwangmin(x,y) },
  c4:{ key:"c4", name:"???", ja:"???", role:"COMING SOON", roleja:"COMING SOON", emoji:"❔", locked:true },
  c5:{ key:"c5", name:"???", ja:"???", role:"COMING SOON", roleja:"COMING SOON", emoji:"❔", locked:true },
};
/* ===== i18n ===== */
let lang=(()=>{ try{return localStorage.getItem("destiny_lang")||"ko";}catch(e){return "ko";} })();
function LN(o){ return (lang==="ja"&&o&&o.ja)?o.ja : (o?o.name:""); }   // 이름

function objAt(st,cwx,cwy){
  const h=hash2(cwx*3+st.s, cwy*5+st.s+99);

  const h2=hash2(cwx*7+st.s+5, cwy*11+st.s+13);    // 타입/배치는 별도 해시(상관 제거)
  const pool=OBJS[st.id]||OBJS.city, tw=pool.reduce((a,o)=>a+o.w,0);
  let r=(h2%100003)/100003*tw, pick=pool[0]; for(const o of pool){ if(r<o.w){pick=o;break;} r-=o.w; }
  const d=ODEF[pick.t], jx=((h2>>>5)%70)-35, jy=((h2>>>11)%70)-35;
  return {t:pick.t, solid:d.solid, fw:d.fw, fh:d.fh, x:cwx*GRIDO+GRIDO/2+jx, y:cwy*GRIDO+GRIDO/2+jy, h:h2};

function collideBox(ent,o){ const hw=o.fw, hh=o.fh; if(!hw)return;
  const nx=clamp(ent.x,o.x-hw,o.x+hw), ny=clamp(ent.y,o.y-hh,o.y+hh);
  let dx=ent.x-nx, dy=ent.y-ny, d2=dx*dx+dy*dy, r=ent.r;
  if(d2<r*r){ if(d2>0.0001){ const d=Math.sqrt(d2),k=(r-d)/d; ent.x+=dx*k; ent.y+=dy*k; }
    else { const px=hw-Math.abs(ent.x-o.x), py=hh-Math.abs(ent.y-o.y);
      if(px<py) ent.x+=(ent.x>=o.x?1:-1)*(px+r); else ent.y+=(ent.y>=o.y?1:-1)*(py+r); } }
}

const ETYPE={

function diff(){ return elapsed/60000; }
function spawnEnemy(type){
  const b=ETYPE[type], d=diff();
  // 변신 전(0~3분)은 완만하게, 변신 후엔 가파르게
  const hpMul=1 + d*0.40 + (player.morphed?(d-3)*0.45:0) + (type==="boss"?d*0.32:0);
  const ang=Math.random()*TAU, rad=Math.max(W,H)*0.62+40;
  enemies.push({type,x:player.x+Math.cos(ang)*rad,y:player.y+Math.sin(ang)*rad,

}
function solidAtWorld(wx,wy){ const st=stage; if(!st||!st.coll)return false; ensureColl(st); const C=st._coll;
  const ix=Math.floor((((wx%C.dw)+C.dw)%C.dw)/C.cw), iy=Math.floor((((wy%C.dh)+C.dh)%C.dh)/C.ch); return C.mask[iy*C.gx+ix]===1; }
function spawnCrate(){ let n=0; for(const e of enemies) if(e.type==="crate")n++; if(n>=6)return;
  for(let tr=0;tr<12;tr++){ const a=Math.random()*TAU, d=rand(130,Math.max(W,H)*0.5);
    const x=player.x+Math.cos(a)*d, y=player.y+Math.sin(a)*d;

}
function updateSpawns(dt){
  const d=diff();
  // 초반 완만 → 변신 후 물량 가속
  let rate=0.8+d*0.95; if(player.morphed) rate*=1.35;
  spawnAcc+=dt/1000*rate;
  while(spawnAcc>=1 && enemies.length<280){ spawnAcc-=1;
    const roll=Math.random(); let type="bat";
    if(d>1.3&&roll>0.80)type="wolf"; if(d>2.7&&roll>0.93)type="tank";
    if(d>1.1&&roll>0.66&&type==="bat")type=Math.random()<0.5?"wolf":"bat";
    spawnEnemy(type);
  }
  // 미니 보스: 90초마다 (스테이지 보스 전까지)
  bossTimer+=dt;
  if(elapsed>=90000 && elapsed<BOSS_MS && bossTimer>=90000){ bossTimer-=90000; spawnEnemy("boss"); flash("⚠ 거대 마물 출현!"); }
  // 나무상자: 약 10초마다
  crateTimer+=dt; if(crateTimer>=10000){ crateTimer-=10000; spawnCrate(); }
}

function nearestEnemy(x,y,maxd){ let best=null,bd=maxd?maxd*maxd:Infinity;

function area(){ return player.stats.area; }
function cdMul(){ return player.stats.haste; }

  const M=might(), A=area(), CD=cdMul();

let dogsArr=[];
function rebuildOrbs(){ orbs.length=0; const L=wlv("drone"); if(L>0){ const n=2+Math.floor(L*0.8); for(let i=0;i<n;i++) orbs.push({a:i/n*TAU,hitcd:new Map()}); }

function updateOrbs(dt){

      for(const e of enemies){ const last=o.hitcd.get(e)||0; if(t-last>360 && dist2(o.x,o.y,e.x,e.y)<(e.r+13)**2){ hurtEnemy(e,dmg); o.hitcd.set(e,t); knock(e,o.x,o.y,5);} } } }
}

function hurtEnemy(e,dmg){ e.hp-=dmg; e.hit=t; dmgtexts.push({x:e.x,y:e.y-e.r,txt:Math.round(dmg),t:0}); if(e.hp<=0)killEnemy(e); }
function knock(e,fx_,fy,p){ const a=Math.atan2(e.y-fy,e.x-fx_); e.x+=Math.cos(a)*p; e.y+=Math.sin(a)*p; }
function killEnemy(e){ e.dead=true;
  if(e.type==="crate"){ sfx("crate"); // 나무상자: 부수면 회복 포션/골드
    for(let i=0;i<6;i++) fx.push({kind:"spark",x:e.x,y:e.y,vx:rand(-3,3),vy:rand(-3,3),t:0,dur:340,col:"#caa46a"});
    if(Math.random()<0.45) pickups.push({x:e.x,y:e.y,kind:"heal",vx:rand(-1,1),vy:rand(-1,1)});
    else pickups.push({x:e.x,y:e.y,kind:"gold",amt:8+((Math.random()*10)|0),vx:rand(-1,1),vy:rand(-1,1)});
    return;
  }
  kills++;
  gems.push({x:e.x,y:e.y,v:e.xp,vx:rand(-1,1),vy:rand(-1,1)});
  if(e.type==="boss"||e.type==="stageboss"){ for(let i=0;i<10;i++)gems.push({x:e.x+rand(-24,24),y:e.y+rand(-24,24),v:8,vx:rand(-2,2),vy:rand(-2,2)}); player.hp=Math.min(player.maxhp,player.hp+25);
    chests.push({x:e.x,y:e.y,vx:0,vy:0}); flash(lang==="ja"?"🎁 戦利品の箱！":"🎁 전리품 상자 출현!"); addShake(6,200); sfx("boom"); }
  for(let i=0;i<(e.type==="bat"||e.type==="wolf"?5:18);i++) fx.push({kind:"spark",x:e.x,y:e.y,vx:rand(-3,3),vy:rand(-3,3),t:0,dur:380,col:e.col});
  if(e.type==="stageboss"){ win(); }
}

/* ============================================================
   MORPH — 변신 컷인 (게임 일시정지 + 연출)

let morphT=0;
const MORPH_CUT=2700, MORPH_FLASH=620;   // 컷인 길이 / 변신 섬광 타이밍
function startMorph(){ state="morphing"; morphT=0; }
function applyMorphStats(){
  player.morphed=true; player.r=15;
  player.maxhp+=60; player.hp=player.maxhp;
  player.stats.might*=1.6; player.stats.haste*=0.8; player.speed*=1.15;
  player.invuln=1900;
  // 변신 직후 주변 정리
  for(const e of enemies){ if(dist2(player.x,player.y,e.x,e.y)<220*220){ knock(e,player.x,player.y,40); } }
  fx.push({kind:"boom",x:player.x,y:player.y,r:200,t:0,dur:560}); sfx("morph");
}
function updateMorph(dt){
  t+=dt; morphT+=dt;
  if(!player.morphed && morphT>=MORPH_FLASH) applyMorphStats();   // 섬광 순간에 변신 확정
  if(morphT>=MORPH_CUT){ state="play"; lastTs=performance.now(); }
}
function renderMorphCutscene(){
  const C=CHARS[player.char], col=C.swatch, p=morphT/MORPH_CUT;
  cx.fillStyle="#05070c"; cx.fillRect(0,0,W,H);
  // 회전 빛줄기
  cx.save(); cx.translate(W/2,H/2); cx.rotate(t*0.0009);
  for(let i=0;i<18;i++){ cx.rotate(TAU/18); cx.globalAlpha=0.10+0.05*Math.sin(t*0.01+i); cx.fillStyle=col;
    cx.beginPath(); cx.moveTo(0,0); cx.lineTo(46,-1400); cx.lineTo(-46,-1400); cx.closePath(); cx.fill(); }
  cx.restore(); cx.globalAlpha=1;
  // 집중선(흰)
  cx.save(); cx.translate(W/2,H/2); cx.rotate(-t*0.0006); cx.globalAlpha=0.06; cx.fillStyle="#fff";
  for(let i=0;i<24;i++){ cx.rotate(TAU/24); cx.beginPath(); cx.moveTo(0,0); cx.lineTo(10,-1400); cx.lineTo(-10,-1400); cx.closePath(); cx.fill(); }
  cx.restore(); cx.globalAlpha=1;
  // 캐릭터 (섬광 전 기본형 → 후 변신형) 대형 포즈
  const showMorph=player.morphed;
  const key=showMorph?C.morphSheet:C.sheet;
  const grow=showMorph?(1+Math.min((morphT-MORPH_FLASH)/400,1)*0.12):1;
  const bigH=Math.min(W,H)*0.46*grow;
  const baseY=H/2+bigH*0.42;
  if(!blitSheet(key, W/2, baseY, bigH, 0, ROW_DOWN)){
    cx.save(); cx.translate(W/2, baseY); const sc=bigH/40; cx.scale(sc,sc); (showMorph?C.drawMorph:C.draw)(0,0); cx.restore();
  }
  // 변신 섬광
  if(morphT>=MORPH_FLASH-120 && morphT<=MORPH_FLASH+220){ cx.globalAlpha=1-Math.abs(morphT-MORPH_FLASH)/220; cx.fillStyle="#fff"; cx.fillRect(0,0,W,H); cx.globalAlpha=1; }
  // 텍스트
  cx.textAlign="center";
  if(morphT<MORPH_FLASH){ const s=clamp(morphT/300,0,1); cx.globalAlpha=s; cx.fillStyle="#fff";
    cx.font="900 "+(38+(1-s)*40)+"px system-ui"; cx.fillText(lang==="ja"?"変 身！":"변 신!", W/2, H*0.2); cx.globalAlpha=1; }
  else { const s=clamp((morphT-MORPH_FLASH)/240,0,1); cx.globalAlpha=s;
    cx.save(); cx.translate(W/2,H*0.19); cx.scale(1+(1-s)*0.4,1+(1-s)*0.4);
    cx.fillStyle=col; cx.font="900 46px system-ui"; cx.fillText(chMorph(C), 0,0);
    cx.fillStyle="#fff"; cx.font="800 15px system-ui"; cx.fillText(chName(C)+(lang==="ja"?" · 覚醒":" · 각성"), 0, 28); cx.restore(); cx.globalAlpha=1; }
  cx.textAlign="left";
}

/* ============================================================
   UPDATE
   ============================================================ */
function update(dt){
  t+=dt; elapsed+=dt;
  if(!player.morphed && elapsed>=MORPH_MS){ startMorph(); return; }
  if(elapsed>=BOSS_MS && !stageBossSpawned){ stageBossSpawned=true; spawnEnemy("stageboss"); flash(lang==="ja"?"☠ ステージボス出現！倒せばクリア":"☠ 스테이지 보스 출현! 처치하면 클리어"); sfx("bossappear"); addShake(8,400); }

  const iv=inputVector();
  if(iv.mag>0.05){ player.x+=iv.x*player.speed*(dt/16.6); player.y+=iv.y*player.speed*(dt/16.6);
    if(Math.abs(iv.x)>0.02)player.face=iv.x<0?-1:1;
    // 스프라이트 방향(우세 축)
    if(Math.abs(iv.x)>Math.abs(iv.y)) player.dir=iv.x<0?ROW_LEFT:ROW_RIGHT;
    else player.dir=iv.y<0?ROW_UP:ROW_DOWN;
    player.moving=true; player.animT+=dt;
  } else player.moving=false;
  // 솔리드 오브젝트(벽) — 매 프레임 화면 주변 솔리드 수집 후 플레이어 밀어내기
  if(imgReady(stage)){ collideMask(player); } else { rebuildSolids(); for(const o of solids) collideBox(player,o); }
  if(shakeT>0) shakeT-=dt;
  cam.x+=(player.x-cam.x)*0.12; cam.y+=(player.y-cam.y)*0.12;
  if(player.regen) player.hp=Math.min(player.maxhp,player.hp+player.regen*dt/1000);
  if(player.invuln>0) player.invuln-=dt;

  updateSpawns(dt); tickWeapons(dt); updateOrbs(dt);

  for(const e of enemies){
    const a=Math.atan2(player.y-e.y,player.x-e.x), wob=Math.sin(t*0.005+e.ph)*0.25;
    let sp=e.spd; if(e.slow>0){ e.slow-=dt; sp*=0.45; }
    e.x+=Math.cos(a+wob)*sp*(dt/16.6); e.y+=Math.sin(a+wob)*sp*(dt/16.6);
    if(e.type!=="boss"&&e.type!=="stageboss"){ if(imgReady(stage)) collideMask(e); else for(const o of solids) collideBox(e,o); }   // 마물도 벽에 막힘(보스류 통과)
    e.dmgCd-=dt;
    if(e.dmg>0 && dist2(player.x,player.y,e.x,e.y)<(e.r+player.r)**2 && e.dmgCd<=0 && player.invuln<=0){ e.dmgCd=600; damagePlayer(e.dmg); }
  }
  for(let i=0;i<enemies.length;i++){ const a=enemies[i];
    for(let j=i+1;j<i+6&&j<enemies.length;j++){ const b=enemies[j]; const dd=dist2(a.x,a.y,b.x,b.y),mr=a.r+b.r;
      if(dd>0.01&&dd<mr*mr){ const d=Math.sqrt(dd),ov=(mr-d)/2/d,dx=(a.x-b.x)*ov,dy=(a.y-b.y)*ov; a.x+=dx;a.y+=dy;b.x-=dx;b.y-=dy; } } }
  enemies=enemies.filter(e=>!e.dead);

  for(const s of shots){
    if(s.kind==="bullet"){ s.x+=s.vx*(dt/16.6); s.y+=s.vy*(dt/16.6); s.life-=dt;
      for(const e of enemies){ if(s.hitset.has(e))continue;
        if(dist2(s.x,s.y,e.x,e.y)<(e.r+s.r)**2){ hurtEnemy(e,s.dmg); knock(e,s.x,s.y,4); s.hitset.add(e); if(s.hitset.size>s.pierce){s.life=0;break;} } }
      if(s.life<=0)s.dead=true;
    } else if(s.kind==="grenade"){ s.t+=dt; if(s.t>=s.dur){ s.dead=true;
        fx.push({kind:"boom",x:s.tx,y:s.ty,r:s.blast,t:0,dur:340});
        for(const e of enemies){ if(dist2(s.tx,s.ty,e.x,e.y)<s.blast*s.blast){ hurtEnemy(e,s.dmg); knock(e,s.tx,s.ty,6);} } }
    } else if(s.kind==="ring"){ s.t+=dt; if(s.t>0){ const rr=s.t/s.dur*s.maxr;
        for(const e of enemies){ if(s.hitset.has(e))continue; const d=Math.hypot(e.x-s.x,e.y-s.y);
          if(Math.abs(d-rr)<s.band+e.r){ hurtEnemy(e,s.dmg); knock(e,s.x,s.y,3); s.hitset.add(e); } } }
      if(s.t>=s.dur)s.dead=true;
    } else if(s.kind==="wave"){ s.x+=s.vx*(dt/16.6); s.y+=s.vy*(dt/16.6); s.r+=s.grow*(dt/16.6); s.life-=dt;
        for(const e of enemies){ if(s.hitset.has(e))continue; if(dist2(s.x,s.y,e.x,e.y)<(s.r+e.r)**2){ hurtEnemy(e,s.dmg); knock(e,s.x,s.y,3); s.hitset.add(e); } }
        if(s.life<=0)s.dead=true;
    } else if(s.kind==="shard"){ s.x+=s.vx*(dt/16.6); s.y+=s.vy*(dt/16.6); s.life-=dt;
        for(const e of enemies){ if(s.hitset.has(e))continue; if(dist2(s.x,s.y,e.x,e.y)<(e.r+s.r)**2){ hurtEnemy(e,s.dmg); if(e.type!=="crate")e.slow=s.slow; s.hitset.add(e); fx.push({kind:"frostburst",x:s.x,y:s.y,t:0,dur:240}); if(s.hitset.size>s.pierce){s.dead=true;break;} } }
        if(s.life<=0)s.dead=true;
    }
  }
  shots=shots.filter(s=>!s.dead);

  for(const f of fx){ if(f.kind==="slash"){ f.t+=dt;
      if(f.t<f.dur){ for(const e of enemies){ if(f.hitset.has(e))continue;
        if(dist2(f.x,f.y,e.x,e.y)<(f.r+e.r)**2){
          if(f.full){ hurtEnemy(e,f.dmg); knock(e,f.x,f.y,5); f.hitset.add(e); }
          else { const ang=Math.atan2(e.y-f.y,e.x-f.x), fa=f.dir<0?Math.PI:0; let da=Math.abs(((ang-fa+Math.PI)%TAU)-Math.PI);
            if(da<1.2){ hurtEnemy(e,f.dmg); knock(e,f.x,f.y,5); f.hitset.add(e);} } } } }
    } else f.t+=dt;
  }
  fx=fx.filter(f=>f.t<f.dur);

  const mag=player.stats.magnet;
  for(const g of gems){ g.x+=g.vx; g.y+=g.vy; g.vx*=0.86; g.vy*=0.86;
    const dd=dist2(player.x,player.y,g.x,g.y);
    if(dd<mag*mag){ const a=Math.atan2(player.y-g.y,player.x-g.x), pull=clamp(mag*mag/dd*0.6,0.5,9); g.x+=Math.cos(a)*pull; g.y+=Math.sin(a)*pull; }
    if(dd<(player.r+8)**2){ g.dead=true; gainXP(g.v); } }
  gems=gems.filter(g=>!g.dead);

  for(const pk of pickups){ pk.x+=pk.vx; pk.y+=pk.vy; pk.vx*=0.86; pk.vy*=0.86;
    const dd=dist2(player.x,player.y,pk.x,pk.y);
    if(dd<mag*mag){ const a=Math.atan2(player.y-pk.y,player.x-pk.x),pull=clamp(mag*mag/dd*0.6,0.5,9); pk.x+=Math.cos(a)*pull; pk.y+=Math.sin(a)*pull; }
    if(dd<(player.r+11)**2){ pk.dead=true;
      sfx("pickup"); if(pk.kind==="heal"){ player.hp=Math.min(player.maxhp,player.hp+Math.round(player.maxhp*0.3)); flash(lang==="ja"?"❤ 回復！":"❤ 회복!"); }
      else { meta.gold+=pk.amt; saveMeta(); flash("💰 +"+pk.amt); } } }
  pickups=pickups.filter(p=>!p.dead);

  // 전리품 상자: 자석으로 끌어와 획득 시 룰렛
  for(const ch of chests){ const dd=dist2(player.x,player.y,ch.x,ch.y);
    if(dd<mag*mag){ const a=Math.atan2(player.y-ch.y,player.x-ch.x), pull=clamp(mag*mag/dd*0.5,0.4,7); ch.x+=Math.cos(a)*pull; ch.y+=Math.sin(a)*pull; }
    if(dd<(player.r+14)**2){ ch.dead=true; openRoulette(); } }
  chests=chests.filter(c=>!c.dead);
  if(state!=="play") return;   // 룰렛 진입 시 이후 처리 중단

  for(const d of dmgtexts){ d.t+=dt; d.y-=dt*0.03; }
  dmgtexts=dmgtexts.filter(d=>d.t<560);
  updateHUD();
}

function damagePlayer(d){
  if(player.shield && player.shield.hits>0 && t<player.shield.until){
    player.shield.hits--; player.invuln=220; fx.push({kind:"block",x:player.x,y:player.y,t:0,dur:300}); return; }
  player.hp-=d; player.invuln=180; sfx("hurt"); fx.push({kind:"hurt",x:player.x,y:player.y,t:0,dur:200});
  if(player.hp<=0){
    if(player.revives>0){ player.revives--; player.hp=player.maxhp*0.5; player.invuln=2200;
      for(const e of enemies){ if(dist2(player.x,player.y,e.x,e.y)<260*260) knock(e,player.x,player.y,60); }
      fx.push({kind:"boom",x:player.x,y:player.y,r:200,t:0,dur:520}); fx.push({kind:"morphflash",x:player.x,y:player.y,t:0,dur:600});
      flash("💖 부활!"); return; }
    player.hp=0; lose();
  }
}
function gainXP(v){ player.xp+=v*player.stats.growth;
  while(player.xp>=player.xpNext){ player.xp-=player.xpNext; player.level++; player.xpNext=Math.floor(player.xpNext*1.32+3); openLevelUp(); } }

/* ============================================================
   LEVEL UP
   ============================================================ */
function buildUpgradePool(){
  const pool=[], owned=Object.keys(player.weapons).length;
  for(const k in WEAPONS){ const L=wlv(k);
    if(L>0&&L<WEAPONS[k].max) pool.push({type:"wep",k,lvl:L+1});
    else if(L===0&&!WEAPONS[k].excl&&owned<7) pool.push({type:"wep",k,lvl:1,isnew:true});
  }
  for(const k in PASSIVES){ const L=player.passive[k]||0; if(L<PASSIVES[k].max) pool.push({type:"pas",k,lvl:L+1,isnew:L===0}); }
  return pool;
}
function pickN(arr,n){ const a=arr.slice(),out=[]; while(a.length&&out.length<n) out.push(a.splice(Math.floor(Math.random()*a.length),1)[0]); return out; }
const WDESC={

  sparkle:{ko:"보호막 + 반짝임 노바 (아카네)",ja:"バリア + きらめきノヴァ (アカネ)"},
  fist:{ko:"발톱으로 주변을 할퀴어 연타 (민민)",ja:"爪で周囲を連撃 (ミンミン)"},
  slam:{ko:"땅을 부숴 충격파·넉백 (민민)",ja:"大地を砕き衝撃波・ノックバック (ミンミン)"},
  blade:{ko:"에너지 칼날을 휘둘러 베어낸다",ja:"エネルギーの刃で薙ぎ払う"},

  bolt:{ko:"범위 내 적에게 무작위 벼락",ja:"範囲内の敵にランダム落雷"},

};
function wepDesc(k,lvl){ const d=WDESC[k]?(lang==="ja"?WDESC[k].ja:WDESC[k].ko):"";
  const evoTxt=lang==="ja"?" ★Lv10で進化":" ★Lv10 진화";
  return d+(lvl>=WEAPONS[k].max?"":(lvl===WEAPONS[k].max-1?evoTxt:"")); }
function openLevelUp(){
  if(state==="over")return; state="levelup"; sfx("levelup");
  const choices=pickN(buildUpgradePool(),3);
  if(choices.length===0){ player.hp=Math.min(player.maxhp,player.hp+40); state="play"; return; }
  const wrap=document.getElementById("cards"); wrap.innerHTML="";
  for(const c of choices){
    const isWep=c.type==="wep", meta=isWep?WEAPONS[c.k]:PASSIVES[c.k];
    const evo=isWep&&c.lvl>=WEAPONS[c.k].max;
    const nm=isWep?wTitle(c.k,c.lvl):pName(c.k);
    const tag=evo?`<small style="color:#ff6bd0">EVO</small>`:(c.isnew?`<small>NEW</small>`:`<small>Lv ${c.lvl}</small>`);
    const desc=isWep?wepDesc(c.k,c.lvl):pDesc(c.k);
    const el=document.createElement("div"); el.className="card";
    el.innerHTML=`<div class="ic">${meta.icon}</div><div><div class="nm">${nm}${tag}</div><div class="ds">${desc}</div></div>`;
    el.onclick=()=>applyUpgrade(c); wrap.appendChild(el);
  }
  document.getElementById("levelup").classList.remove("hidden");
}
function applyReward(c){
  if(c.type==="wep"){ player.weapons[c.k]=(player.weapons[c.k]||0)+1; if(c.k==="drone"||c.k==="dogs")rebuildOrbs(); }
  else if(c.type==="pas"){ const k=c.k; player.passive[k]=(player.passive[k]||0)+1;
    if(k==="might")player.stats.might+=0.15; if(k==="area")player.stats.area+=0.14;
    if(k==="haste")player.stats.haste*=0.90; if(k==="magnet")player.stats.magnet*=1.28;
    if(k==="speed")player.speed*=1.12; if(k==="vigor"){player.maxhp+=25;player.hp=Math.min(player.maxhp,player.hp+40);player.regen+=0.3;} }
  else if(c.type==="bonus"){ meta.gold+=30; saveMeta(); player.hp=Math.min(player.maxhp,player.hp+30); }
}
function applyUpgrade(c){
  applyReward(c);
  document.getElementById("levelup").classList.add("hidden");
  refreshWepRow(); state="play"; lastTs=performance.now();
}

   보스 룰렛 (뱀파이어 서바이버식 전리품)
   ============================================================ */
let rouletteRewards=null;
function rewardMeta(c){
  if(c.type==="wep"){ const evo=c.lvl>=WEAPONS[c.k].max; return {icon:WEAPONS[c.k].icon, name:wTitle(c.k,c.lvl)+(evo?" ★EVO":(c.isnew?" (NEW)":" Lv"+c.lvl))}; }
  if(c.type==="pas") return {icon:PASSIVES[c.k].icon, name:pName(c.k)+" Lv"+c.lvl};
  return {icon:"💰", name:lang==="ja"?"ゴールド+30・回復":"골드 +30 · 회복"};
}
function openRoulette(){
  state="roulette";
  const r=Math.random(); let count=r<0.6?1:(r<0.9?3:5);
  const pool=buildUpgradePool();
  let rewards=pickN(pool, Math.min(count,pool.length));
  while(rewards.length<count) rewards.push({type:"bonus"});
  rouletteRewards=rewards;
  const reels=document.getElementById("reels"); reels.innerHTML="";
  document.getElementById("rewardnames").textContent="";
  document.getElementById("rouletteGo").classList.add("hidden");
  const allIcons=Object.values(WEAPONS).map(w=>w.icon).concat(Object.values(PASSIVES).map(p=>p.icon),["💰"]);
  const reelEls=rewards.map(()=>{ const el=document.createElement("div"); el.className="reel"; el.textContent="❔"; reels.appendChild(el); return el; });
  document.getElementById("roulette").classList.remove("hidden");
  // 스핀 애니메이션
  let spinning=true;
  const spin=setInterval(()=>{ if(!spinning)return;
    reelEls.forEach((el,i)=>{ if(!el.classList.contains("lock")) el.textContent=allIcons[(Math.random()*allIcons.length)|0]; });
  },70);
  // 순차 정지
  reelEls.forEach((el,i)=>{ setTimeout(()=>{
    el.textContent=rewardMeta(rewards[i]).icon; el.classList.add("lock");
    if(i===reelEls.length-1){ spinning=false; clearInterval(spin);
      document.getElementById("rewardnames").innerHTML=rewards.map(c=>rewardMeta(c).name).join(" · ");
      document.getElementById("rouletteGo").classList.remove("hidden");
    }
  }, 900+i*450); });
}
function closeRoulette(){
  if(rouletteRewards){ rouletteRewards.forEach(applyReward); rouletteRewards=null; }
  document.getElementById("roulette").classList.add("hidden");
  refreshWepRow(); state="play"; lastTs=performance.now();
}

function w2s(x,y){ return [x-cam.x+W/2, y-cam.y+H/2]; }
function drawGround(){
  const st=stage||STAGES.ruins;
  if(imgReady(st)){ const img=BG[st.img], iw=img.naturalWidth, ih=img.naturalHeight;
    let ox=(W/2-cam.x)%iw; if(ox>0)ox-=iw; let oy=(H/2-cam.y)%ih; if(oy>0)oy-=ih;
    for(let x=ox;x<W+iw;x+=iw)for(let y=oy;y<H+ih;y+=ih) cx.drawImage(img,Math.floor(x),Math.floor(y));
    return;
  }
  // 폴백: 16도트 절차 배경
  const tile=st._tile||makeTile(st), T=tile.width; cx.imageSmoothingEnabled=false;
  let ox=(W/2-cam.x)%T; if(ox>0)ox-=T; let oy=(H/2-cam.y)%T; if(oy>0)oy-=T;
  for(let x=ox;x<W+T;x+=T)for(let y=oy;y<H+T;y+=T) cx.drawImage(tile,Math.floor(x),Math.floor(y));
  cx.imageSmoothingEnabled=true;
  const G=46, ox2=((-cam.x+W/2)%G+G)%G, oy2=((-cam.y+H/2)%G+G)%G;
  for(let gx=-G;gx<W+G;gx+=G)for(let gy=-G;gy<H+G;gy+=G){
    const wx=Math.round((gx+cam.x-W/2)/G), wy=Math.round((gy+cam.y-H/2)/G), h=hash2(wx+st.s,wy-st.s);
    if(h%3===0){ drawDecal(st, gx+ox2-G+(h%19), gy+oy2-G+((h>>4)%19), h); }
  }
}
function drawEnemy(e){
  const [sx,sy]=w2s(e.x,e.y); if(sx<-70||sx>W+70||sy<-70||sy>H+90)return;
  const hitw=e.hit&&t-e.hit<90;
  cx.fillStyle="rgba(0,0,0,.35)"; cx.beginPath(); cx.ellipse(sx,sy+e.r*0.7,e.r*0.82,e.r*0.32,0,0,TAU); cx.fill();
  const bob=Math.sin(t*0.006+e.ph)*e.r*0.12;
  cx.save(); cx.translate(sx,sy+bob);
  if(e.type==="bat") drawBat(e); else if(e.type==="wolf") drawWolf(e); else if(e.type==="tank") drawTank(e); else if(e.type==="crate") drawCrate(e); else if(e.type==="stageboss") drawStageBoss(e); else drawDemon(e);
  if(hitw){ cx.globalAlpha=0.75; cx.fillStyle="#fff"; cx.beginPath(); cx.ellipse(0,-e.r*0.3,e.r*0.95,e.r*1.05,0,0,TAU); cx.fill(); cx.globalAlpha=1; }
  cx.restore();
  if(e.type==="boss"||e.type==="stageboss"){ const w=e.r*1.7; cx.fillStyle="#000a"; cx.fillRect(sx-w/2,sy-e.r*2-6,w,6); cx.fillStyle="#ff4d6d"; cx.fillRect(sx-w/2,sy-e.r*2-6,w*Math.max(0,e.hp/e.maxhp),6); }
}

function drawPlayerSprite(px,py){
  const C=CHARS[player.char], key=player.morphed?C.morphSheet:C.sheet;
  const destH=player.morphed?56:50;
  // 그림자
  cx.fillStyle="rgba(0,0,0,.32)"; cx.beginPath(); cx.ellipse(px,py,destH*0.22,destH*0.085,0,0,TAU); cx.fill();
  const col=player.morphed?0:(player.moving?Math.floor(player.animT/150)%4:0); // 변신 시트는 동적 포즈라 정지 프레임 사용(깨짐 방지)
  const blink=player.invuln>0 && Math.floor(t/80)%2===0;
  if(!blitSheet(key, px, py+2, destH, col, player.dir, blink?0.4:1)){
    (player.morphed?C.drawMorph:C.draw)(px,py);   // 이미지 미로드 시 벡터 폴백
  }
}
function render(){
  if(state==="morphing"){ renderMorphCutscene(); return; }
  cx.clearRect(0,0,W,H);
  // 스크린 셰이크
  let shaken=false;
  if(shakeT>0){ const amp=shakeMag*Math.min(1,shakeT/160); cx.save(); cx.translate(rand(-amp,amp),rand(-amp,amp)); shaken=true; }
  drawGround();
  const useImg=imgReady(stage);
  if(!useImg){ // 절차 폴백일 때만 절차 오브젝트(깊이 정렬)
    forEachVisibleObj(o=>{ const [sx,sy]=w2s(o.x,o.y); cx.fillStyle="rgba(0,0,0,.26)"; cx.beginPath(); cx.ellipse(sx,sy,objShadowR(o.t),objShadowR(o.t)*0.38,0,0,TAU); cx.fill(); });
    forEachVisibleObj(o=>{ if(o.y<=player.y){ const [sx,sy]=w2s(o.x,o.y); drawObj(o.t,sx,sy,o.h); } });
  }
  drawGems(); drawPickups(); drawChests(); drawShots();
  for(const e of enemies) drawEnemy(e);
  drawOrbs(); drawDogs(); drawFx();
  const [px,py]=w2s(player.x,player.y);
  drawPlayerSprite(px,py);
  if(!useImg) forEachVisibleObj(o=>{ if(o.y>player.y){ const [sx,sy]=w2s(o.x,o.y); drawObj(o.t,sx,sy,o.h); } });
  // 반짝임 보호막
  if(player.shield && player.shield.hits>0 && t<player.shield.until){
    cx.save(); cx.globalAlpha=0.5+Math.sin(t*0.02)*0.2; cx.strokeStyle="#ffd0ee"; cx.lineWidth=2.5;
    cx.beginPath(); cx.arc(px,py-12,player.r+12,0,TAU); cx.stroke();
    cx.fillStyle="#fff"; for(let i=0;i<player.shield.hits;i++){ const a=t*0.004+i/player.shield.hits*TAU; drawStar(px+Math.cos(a)*(player.r+12),py-12+Math.sin(a)*(player.r+12),2.6); }
    cx.restore();
  }
  if(stage&&stage.tint){ cx.fillStyle=stage.tint; cx.fillRect(0,0,W,H); }   // 분위기 틴트
  if(flashMsg&&flashT>0){ flashT-=16; cx.globalAlpha=clamp(flashT/600,0,1); cx.fillStyle="#ffd86a"; cx.font="800 20px system-ui"; cx.textAlign="center"; cx.fillText(flashMsg,W/2,H*0.28); cx.globalAlpha=1; cx.textAlign="left"; }
  cx.font="800 13px system-ui"; cx.textAlign="center";
  for(const d of dmgtexts){ const [dx,dy]=w2s(d.x,d.y); cx.globalAlpha=clamp(1-d.t/560,0,1); cx.fillStyle="#fff"; cx.fillText(d.txt,dx,dy); }
  cx.globalAlpha=1; cx.textAlign="left";
  if(shaken) cx.restore();
}

/* ============================================================
   END / FLOW
   ============================================================ */
function awardGold(cleared){
  const g = kills*2 + Math.floor(elapsed/1000) + (player.morphed?120:0) + (cleared?500:0);
  meta.gold += g; saveMeta(); return g;
}
function lose(){ if(state==="over")return; state="over"; sfx("lose"); const g=awardGold(false);
  document.getElementById("overttl").textContent=lang==="ja"?"戦闘不能":"전투 불능";
  document.getElementById("overmsg").innerHTML=lang==="ja"?(chName(CHARS[player.char])+"は倒れた…<br>戦隊は再び立ち上がる。"):(chName(CHARS[player.char])+"은(는) 쓰러졌다…<br>전대는 다시 일어선다. 재도전하라.");
  showOver(g); }
function win(){ if(state==="over")return; won=true; state="over"; sfx("win"); const g=awardGold(true);
  document.getElementById("overttl").textContent=lang==="ja"?"ステージクリア！":"스테이지 클리어!";
  document.getElementById("overmsg").innerHTML=lang==="ja"?("20分の死闘の末、ステージボスを撃破！<br>"+chMorph(CHARS[player.char])+"の活躍でゲートは閉じた。✨"):("20분의 사투 끝에 스테이지 보스를 처치했다.<br>"+chMorph(CHARS[player.char])+"의 활약으로 게이트는 닫혔다. ✨");
  showOver(g); }
function showOver(goldEarned){
  document.getElementById("ov_time").textContent=fmtTime(elapsed);
  document.getElementById("ov_kill").textContent=kills; document.getElementById("ov_lv").textContent=player.level;
  document.getElementById("ov_gold").textContent="💰 +"+goldEarned+"  (보유 "+meta.gold+")";
  document.getElementById("retrybtn").textContent=(won?"다시 플레이":"다시 도전");
  document.getElementById("hud").classList.add("hidden");
  document.getElementById("over").classList.remove("hidden");
}

/* ---------- 상점 (메타 강화) ---------- */
function refreshGoldLabels(){ const g="💰 "+meta.gold;
  document.getElementById("titlegold").textContent=g; document.getElementById("shopgold").textContent=g; }
function openShop(){
  document.getElementById("title").classList.add("hidden");
  document.getElementById("over").classList.add("hidden");
  document.getElementById("shop").classList.remove("hidden");
  renderShop();
}
function renderShop(){
  refreshGoldLabels();
  const list=document.getElementById("shoplist"); list.innerHTML="";
  for(const it of SHOP){ const lv=meta.up[it.k]||0, maxed=lv>=it.max, cost=maxed?0:it.cost(lv), afford=meta.gold>=cost;
    let pips=""; for(let i=0;i<it.max;i++) pips+=(i<lv?"<b>◆</b>":"◇");
    const el=document.createElement("div"); el.className="shoprow";
    const btn = maxed?`<div class="buybtn max">MAX</div>`
      :`<div class="buybtn ${afford?"":"off"}">💰 ${cost}</div>`;
    el.innerHTML=`<div class="ic">${it.icon}</div>
      <div style="flex:1"><div class="nm">${lang==="ja"&&it.ja?it.ja:it.name} <small style="color:#7f8ba3">Lv ${lv}/${it.max}</small></div>
      <div class="ds">${lang==="ja"&&it.perja?it.perja:it.per}</div><div class="pips">${pips}</div></div>${btn}`;
    if(!maxed && afford){ el.querySelector(".buybtn").onclick=()=>{ meta.gold-=cost; meta.up[it.k]=lv+1; saveMeta(); renderShop(); }; }
    list.appendChild(el);
  }
}

function showSelect(){
  state="title";
  document.getElementById("title").classList.add("hidden");
  document.getElementById("over").classList.add("hidden");
  const list=document.getElementById("charlist"); list.innerHTML="";
  for(const k in CHARS){ const C=CHARS[k]; const el=document.createElement("div"); el.className="card"+(C.locked?" locked":"");
    if(C.locked){ el.innerHTML=`<div class="ic">🔒</div><div><div class="nm">${chName(C)}</div><div class="ds">${chRole(C)}</div></div>`; }
    else { el.innerHTML=`<div class="ic" style="border-color:${C.swatch};padding:0"><canvas class="pcv" id="pc_${k}" width="50" height="56"></canvas></div>
      <div><div class="nm">${chName(C)} <small>${chRole(C)}</small></div><div class="ds">${chDesc(C)}</div>
      <div class="tags"><span class="tag">${WEAPONS[C.base].icon} ${LN(WEAPONS[C.base])}</span>
      <span class="tag">${WEAPONS[C.signature].icon} ${LN(WEAPONS[C.signature])}</span>
      <span class="tag" style="color:${C.swatch}">⚡ ${chMorph(C)}</span></div></div>`;
      el.onclick=()=>showStageSelect(k); }
    list.appendChild(el);
  }
  document.getElementById("select").classList.remove("hidden");
  drawPortraits();
}

let pendingChar=null;
function showStageSelect(charKey){
  pendingChar=charKey; state="title";
  document.getElementById("select").classList.add("hidden");
  document.getElementById("over").classList.add("hidden");
  const list=document.getElementById("stagelist"); list.innerHTML="";
  for(const k in STAGES){ const S=STAGES[k]; const el=document.createElement("div"); el.className="card";
    el.innerHTML=`<img class="stagethumb" src="sprites/bg/${S.img}.jpg?v=3" alt="">
      <div><div class="nm">${S.emoji} ${sName(S)}</div><div class="ds">${sDesc(S)}</div></div>`;
    el.onclick=()=>startGame(pendingChar,k);
    list.appendChild(el);
  }
  document.getElementById("stage").classList.remove("hidden");
}

/* ============================================================
   LOOP + BUTTONS
   ============================================================ */
function loop(ts){ const dt=Math.min(40,ts-lastTs||16); lastTs=ts;
  if(state==="play") update(dt);
  else if(state==="morphing"){ updateMorph(dt); render(); requestAnimationFrame(loop); return; }
  if(state==="play"||state==="levelup"||state==="over"||state==="paused") render();
  requestAnimationFrame(loop); }
requestAnimationFrame(loop);

function goHome(){ ["select","stage","over","shop","levelup","hud"].forEach(id=>document.getElementById(id).classList.add("hidden")); document.getElementById("title").classList.remove("hidden"); state="title"; refreshGoldLabels(); }
document.getElementById("startbtn").onclick=()=>{ audioInit(); showSelect(); };
document.getElementById("langbtn").onclick=toggleLang;
document.getElementById("mutebtn").onclick=()=>{ audioInit(); toggleMute(); };
document.getElementById("backbtn").onclick=goHome;
document.getElementById("stageback").onclick=()=>{ document.getElementById("stage").classList.add("hidden"); showSelect(); };
document.getElementById("shopbtn").onclick=openShop;
document.getElementById("shopback").onclick=goHome;
document.getElementById("retrybtn").onclick=()=>{ if(player) startGame(player.char, stage?stage.id:lastStageKey); };
document.getElementById("tohome").onclick=showSelect;
document.getElementById("rouletteGo").onclick=closeRoulette;

// 에셋 로딩 (상태 초기화 이후)
function onSheetLoad(){ if(state==="title") drawPortraits(); }
["gwangmin_basic","akane_basic","kimchired","samonpink","minmin_basic","goldbear"].forEach(n=>{
  const im=new Image(); im.onload=onSheetLoad; im.src="sprites/sheets/"+n+".png?v=6"; SHEETS[n.replace("_basic","")]=im;
});
["ruins","lava","snow","forest"].forEach(n=>{ const im=new Image(); im.src="sprites/bg/"+n+".jpg?v=3"; BG[n]=im; });
document.getElementById("howbtn").onclick=()=>alert(T("howtext"));
if(muted){ const mb=document.getElementById("mutebtn"); if(mb)mb.textContent="🔇"; }
applyLang(); refreshGoldLabels();
const pb=document.getElementById("pausebtn");
pb.addEventListener("click",()=>{ if(state==="play"){state="paused";pb.textContent="▶";} else if(state==="paused"){state="play";pb.textContent="❚❚";lastTs=performance.now();} });
</script>
