name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "index.html"
      - "manifest.webmanifest"
      - "sw.js"
      - "icons/**"
      - "app/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # 1) 기존(루트) 단일파일 게임 — 그대로 / 에 배포
      - name: Assemble root site (v1)
        run: |
          mkdir -p _site/icons
          cp index.html manifest.webmanifest sw.js _site/
          cp -r icons/* _site/icons/
          touch _site/.nojekyll
      # 2) 새 구조 프로젝트 — /app/ 경로에 빌드하여 배포
      - name: Build v2 app
        working-directory: app
        run: |
          npm ci || npm install
          npm run build
      - name: Place v2 under /app
        run: |
          mkdir -p _site/app
          cp -r app/dist/* _site/app/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
